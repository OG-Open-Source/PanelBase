<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>System Panel - PanelBase</title>
		<link rel="icon" type="image/png" sizes="128x128" href="favicon.png">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
		<style>
			:root {
				--font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				--font-monospace: "Source Code Pro", monospace;
				--background-color: #F2F2F7;
				--text-color: #1C1C1E;
				--secondary-text: #8E8E93;
				--primary-color: #007AFF;
				--primary-gradient: linear-gradient(135deg, #0A84FF, #0066CC);
				--primary-rgb: 0, 122, 255;
				--error-color: #FF3B30;
				--success-color: #34C759;
				--warning-color: #FFCC00;
				--info-color: #5856D6;
				--border-radius: 12px;
				--border-radius-lg: 16px;
				--border-radius-sm: 8px;
				--input-height: 44px;
				--container-bg: rgba(255, 255, 255, 0.95);
				--container-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
				--input-background: #FFFFFF;
				--input-border: rgba(0, 0, 0, 0.1);
				--body-gradient: linear-gradient(135deg, #F6F8FB, #E9EEF3);
				--terminal-bg: #1E1E1E;
				--terminal-text: #FFFFFF;
				--terminal-header-bg: rgba(255, 255, 255, 0.1);
				--terminal-button-hover: rgba(255, 255, 255, 0.1);
				--main-bg: transparent;
			}

			:root.dark-mode {
				--background-color: #000000;
				--text-color: #FFFFFF;
				--secondary-text: #8E8E93;
				--container-bg: rgba(28, 28, 30, 0.95);
				--container-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
				--input-background: #1C1C1E;
				--input-border: rgba(255, 255, 255, 0.1);
				--body-gradient: linear-gradient(135deg, #1C1C1E, #2C2C2E);
				--primary-rgb: 10, 132, 255;
				--terminal-bg: #000000;
				--main-bg: transparent;
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: var(--font-family);
			}

			body {
				background: var(--body-gradient);
				min-height: 100vh;
				padding: 20px;
				position: relative;
				overflow-x: hidden;
				isolation: isolate;
			}

			.container,
			.main-content {
				background: var(--main-bg);
			}

			.sidebar {
				background: var(--container-bg);
				border-radius: var(--border-radius-lg);
				padding: 20px;
				box-shadow: var(--container-shadow);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				height: calc(100vh - 40px);
				position: sticky;
				top: 20px;
				display: flex;
				flex-direction: column;
			}

			.header {
				background: var(--container-bg);
				border-radius: var(--border-radius-lg);
				padding: 20px;
				box-shadow: var(--container-shadow);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.logo {
				font-size: 24px;
				font-weight: 700;
				background: var(--primary-gradient);
				background-clip: text;
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				margin-bottom: 24px;
				text-align: center;
			}

			.nav-item {
				padding: 12px 16px;
				border-radius: var(--border-radius);
				font-family: var(--font-family);
				background: var(--background-color);
				color: var(--text-color);
				text-decoration: none;
				display: flex;
				align-items: center;
				gap: 12px;
				transition: all 0.3s ease;
				margin-bottom: 8px;
			}

			.nav-item:hover {
				background: rgba(var(--primary-rgb), 0.1);
				color: var(--primary-color);
			}

			.nav-item.active {
				background: var(--primary-gradient);
				color: white;
			}

			.nav-item i {
				width: 20px;
				text-align: center;
			}

			.user-info {
				margin-top: auto;
				padding-top: 20px;
				border-top: 1px solid var(--input-border);
				display: flex;
				align-items: center;
				gap: 12px;
			}

			.user-avatar {
				width: 40px;
				height: 40px;
				border-radius: 50%;
				background: var(--primary-gradient);
				display: flex;
				align-items: center;
				justify-content: center;
				color: white;
				font-weight: 600;
			}

			.user-details {
				flex: 1;
			}

			.user-name {
				font-weight: 600;
				color: var(--text-color);
			}

			.user-role {
				font-size: 12px;
				color: var(--secondary-text);
			}

			.logout-button {
				padding: 8px;
				border-radius: var(--border-radius-sm);
				color: var(--secondary-text);
				cursor: pointer;
				transition: all 0.3s ease;
			}

			.logout-button:hover {
				color: var(--error-color);
				background: rgba(255, 59, 48, 0.1);
			}

			.system-stats {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
				gap: 20px;
			}

			.stat-card {
				background: var(--container-bg);
				border-radius: var(--border-radius);
				padding: 20px;
				box-shadow: var(--container-shadow);
				backdrop-filter: blur(8px);
				-webkit-backdrop-filter: blur(8px);
			}

			.stat-title {
				color: var(--secondary-text);
				font-size: 14px;
				display: flex;
				align-items: center;
				gap: 8px;
			}

			.stat-value {
				font-size: 24px;
				font-weight: 600;
				color: var(--text-color);
			}

			.stat-trend {
				font-size: 12px;
				display: flex;
				align-items: center;
				gap: 4px;
			}

			.trend-up {
				color: #34C759;
			}

			.trend-down {
				color: var(--error-color);
				line-height: 1.5;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
			}

			.terminal {
				background: var(--terminal-bg);
				border-radius: var(--border-radius);
				padding: 20px;
				color: var(--terminal-text);
				font-family: var(--font-monospace);
				font-size: 14px;
				line-height: 1.5;
				overflow-y: auto;
				max-height: 400px;
				position: relative;
				margin-top: 20px;
			}

			.terminal-container {
				display: flex;
				flex-direction: column;
				width: 100%;
				height: 100%;
			}

			.terminal-output {
				margin: 0;
				padding: 0;
				list-style-type: none;
				width: 100%;
				white-space: pre-wrap;
				word-wrap: break-word;
			}

			.terminal-output li {
				margin: 5px 0;
				padding: 0;
				width: 100%;
			}

			.terminal-header {
				background: var(--terminal-header-bg);
				padding: 8px 16px;
				border-radius: var(--border-radius) var(--border-radius) 0 0;
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin: -20px -20px 16px;
			}

			.terminal-title {
				font-size: 14px;
				font-weight: 500;
			}

			.terminal-buttons {
				display: flex;
				gap: 8px;
			}

			.terminal-button {
				padding: 4px 12px;
				border-radius: var(--border-radius-sm);
				background: transparent;
				color: var(--terminal-text);
				border: 1px solid var(--terminal-text);
				cursor: pointer;
				transition: all 0.3s ease;
			}

			.terminal-button:hover {
				background: var(--terminal-button-hover);
			}

			.terminal-output .command {
				color: #00ff00;
			}

			.terminal-output .error {
				color: var(--error-color);
			}

			.terminal-output .success {
				color: #00ff00;
			}

			.terminal-output .info {
				color: #0099ff;
			}

			.terminal-output .warning {
				color: #ffff00;
			}

			.progress-bar {
				height: 4px;
				background: rgba(255, 255, 255, 0.1);
				border-radius: 2px;
				overflow: hidden;
				margin-top: 12px;
			}

			.progress-fill {
				height: 100%;
				background: var(--primary-color);
				width: 0;
				transition: width 0.3s ease;
			}

			.theme-switcher {
				position: relative;
			}

			.theme-switcher button {
				background: none;
				border: none;
				color: var(--secondary-text);
				font-size: 18px;
				cursor: pointer;
				padding: 8px;
				border-radius: var(--border-radius-sm);
				transition: all 0.3s ease;
				width: 36px;
				height: 36px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.theme-switcher button:hover {
				background: rgba(0, 122, 255, 0.1);
				color: var(--primary-color);
			}

			@keyframes rotate {
				from { transform: rotate(0deg); }
				to { transform: rotate(360deg); }
			}

			@keyframes backgroundMove {
				from { background-position: 0 0; }
				to { background-position: 100% 100%; }
			}

			@media (prefers-color-scheme: dark) {
				:root:not(.light-mode) {
					--background-color: #000000;
					--input-background: #1C1C1E;
					--text-color: #FFFFFF;
					--secondary-text: #8E8E93;
					--container-bg: rgba(28, 28, 30, 0.95);
					--container-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
					--input-border: rgba(255, 255, 255, 0.1);
					--body-gradient: linear-gradient(135deg, #1C1C1E, #2C2C2E);
					--primary-rgb: 10, 132, 255;
					--terminal-bg: #000000;
				}

				:root:not(.light-mode) body {
					background: var(--body-gradient);
				}

				:root:not(.light-mode) .container,
				:root:not(.light-mode) .main-content {
					background: transparent;
				}

				:root:not(.light-mode) .sidebar,
				:root:not(.light-mode) .header,
				:root:not(.light-mode) .stat-card {
					background: var(--container-bg);
					backdrop-filter: blur(16px);
					-webkit-backdrop-filter: blur(16px);
				}

				:root:not(.light-mode) p,
				:root:not(.light-mode) label {
					color: var(--text-color);
				}

				:root:not(.light-mode) input {
					color: var(--text-color);
					background: var(--input-background);
					border-color: var(--input-border);
				}

				:root:not(.light-mode) .nav-item {
					color: var(--text-color);
				}

				:root:not(.light-mode) .user-info {
					border-top-color: var(--input-border);
				}

				:root:not(.light-mode) .user-name,
				:root:not(.light-mode) .stat-value,
				:root:not(.light-mode) h1 {
					color: var(--text-color);
				}

				:root:not(.light-mode) body::before {
					background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
				}
			}

			@media (max-width: 768px) {
				.container {
					grid-template-columns: 1fr;
				}

				.sidebar {
					position: fixed;
					left: -250px;
					top: 0;
					bottom: 0;
					z-index: 1000;
					transition: left 0.3s ease;
				}

				.sidebar.active {
					left: 0;
				}

				.mobile-menu {
					display: block;
				}
			}

			@media (max-width: 480px) {
				body {
					padding: 10px;
				}

				.system-stats {
					grid-template-columns: 1fr;
				}
			}

			@font-face {
				font-family: "Source Code Pro";
				src: url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500&display=swap");
				font-display: swap;
			}

			.language-switcher {
				position: relative;
				margin-left: 10px;
			}

			.language-switcher button {
				background: none;
				border: none;
				color: var(--secondary-text);
				font-size: 14px;
				cursor: pointer;
				padding: 8px;
				border-radius: var(--border-radius-sm);
				transition: all 0.3s ease;
				width: 36px;
				height: 36px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.language-switcher button:hover {
				background: rgba(0, 122, 255, 0.1);
				color: var(--primary-color);
			}

			.container {
				max-width: 1200px;
				margin: 0 auto;
				display: grid;
				grid-template-columns: 250px 1fr;
				gap: 20px;
				position: relative;
				z-index: 1;
			}

			.main-content {
				display: flex;
				flex-direction: column;
				gap: 20px;
				padding: 20px;
				background: var(--container-bg);
				border-radius: var(--border-radius-lg);
				box-shadow: var(--container-shadow);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
			}

			.header {
				margin: -20px -20px 0;
				padding: 20px;
				background: var(--container-bg);
				border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
				box-shadow: var(--container-shadow);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				display: flex;
				justify-content: space-between;
				align-items: center;
				border-bottom: 1px solid var(--input-border);
			}

			.system-stats {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
				gap: 20px;
				padding: 20px 0;
			}

			.stat-card {
				background: var(--container-bg);
				border-radius: var(--border-radius);
				padding: 20px;
				box-shadow: var(--container-shadow);
				backdrop-filter: blur(8px);
				-webkit-backdrop-filter: blur(8px);
			}

			.header-controls {
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.content-wrapper {
				background: var(--container-bg);
				border-radius: var(--border-radius-lg);
				box-shadow: var(--container-shadow);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				overflow: hidden;
			}

			.main-content {
				display: flex;
				flex-direction: column;
				gap: 20px;
			}

			.header {
				padding: 20px;
				background: var(--container-bg);
				border-bottom: 1px solid var(--input-border);
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.system-stats {
				padding: 20px;
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
				gap: 20px;
			}

			.terminal-wrapper {
				padding: 20px;
				background: var(--container-bg);
			}

			.stat-card {
				background: var(--container-bg);
				border: 1px solid var(--input-border);
				border-radius: var(--border-radius);
				padding: 20px;
			}
		</style>
		<script>
			(function() {
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const savedTheme = localStorage.getItem('theme-preference');

				if (savedTheme) {
					document.documentElement.classList.add(`${savedTheme}-mode`);
				} else if (prefersDark) {
					document.documentElement.classList.add('dark-mode');
				}
			})();
		</script>
	</head>
	<body>
		<div class="container">
			<aside class="sidebar">
				<div class="logo">
					<a href="/panel.html" style="text-decoration: none; background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display: block; text-align: center;">PanelBase</a>
				</div>
				<nav>
					<a href="#dashboard" class="nav-item active">
						<i class="fas fa-chart-line"></i>
						<span data-i18n="nav-dashboard">儀表板</span>
					</a>
					<a href="#system" class="nav-item">
						<i class="fas fa-server"></i>
						<span data-i18n="nav-system">系統管理</span>
					</a>
					<a href="#services" class="nav-item">
						<i class="fas fa-cogs"></i>
						<span data-i18n="nav-services">服務管理</span>
					</a>
					<a href="#network" class="nav-item">
						<i class="fas fa-network-wired"></i>
						<span data-i18n="nav-network">網路管理</span>
					</a>
					<a href="#files" class="nav-item">
						<i class="fas fa-folder"></i>
						<span data-i18n="nav-files">檔案管理</span>
					</a>
					<a href="#settings" class="nav-item">
						<i class="fas fa-cog"></i>
						<span data-i18n="nav-settings">設定</span>
					</a>
				</nav>
				<div class="user-info">
					<div class="user-avatar">
						<i class="fas fa-user"></i>
					</div>
					<div class="user-details">
						<div class="user-name" id="username">載入中...</div>
						<div class="user-role" data-i18n="user-role">管理員</div>
					</div>
					<div class="logout-button" onclick="handleLogout()">
						<i class="fas fa-sign-out-alt"></i>
					</div>
				</div>
			</aside>

			<main class="main-content">
				<div class="content-wrapper">
					<header class="header">
						<h1 data-i18n="dashboard-title">系統儀表板</h1>
						<div class="header-controls">
							<div class="theme-switcher">
								<button id="themeToggle" onclick="toggleTheme()">
									<i class="fas fa-moon"></i>
								</button>
							</div>
							<div class="language-switcher">
								<button id="langToggle" onclick="toggleLanguage()">TW</button>
							</div>
						</div>
					</header>

					<div class="system-stats">
						<div class="stat-card">
							<div class="stat-title">
								<i class="fas fa-microchip"></i>
								<span data-i18n="stat-cpu">CPU 使用率</span>
							</div>
							<div class="stat-value" id="cpuUsage">--</div>
							<div class="stat-trend trend-up">
								<i class="fas fa-arrow-up"></i>
								<span>2.5%</span>
							</div>
						</div>
						<div class="stat-card">
							<div class="stat-title">
								<i class="fas fa-memory"></i>
								<span data-i18n="stat-memory">記憶體使用率</span>
							</div>
							<div class="stat-value" id="memoryUsage">--</div>
							<div class="stat-trend trend-down">
								<i class="fas fa-arrow-down"></i>
								<span>1.2%</span>
							</div>
						</div>
						<div class="stat-card">
							<div class="stat-title">
								<i class="fas fa-hdd"></i>
								<span data-i18n="stat-disk">磁碟使用率</span>
							</div>
							<div class="stat-value" id="diskUsage">--</div>
							<div class="stat-trend trend-up">
								<i class="fas fa-arrow-up"></i>
								<span>0.8%</span>
							</div>
						</div>
					</div>

					<div class="terminal-wrapper">
						<div class="terminal">
							<div class="terminal-header">
								<div class="terminal-title" data-i18n="terminal-title">系統更新</div>
								<div class="terminal-form">
									<input type="text" id="urlInput" placeholder="請輸入網址" style="padding: 4px 8px; margin-right: 8px; border-radius: 4px; border: 1px solid var(--input-border); background: var(--input-background); color: var(--text-color);">
									<button class="terminal-button" onclick="getUrlContent()">獲取內容</button>
								</div>
								<div class="terminal-buttons">
									<button class="terminal-button" onclick="startUpdate()">開始更新</button>
									<button class="terminal-button" onclick="clearTerminal()">清除</button>
								</div>
							</div>
							<div class="terminal-output"></div>
						</div>
					</div>
				</div>
			</main>
		</div>

		<script>
			const translations = {
				'en': {
					'nav-dashboard': 'Dashboard',
					'nav-system': 'System',
					'nav-network': 'Network',
					'nav-services': 'Services',
					'nav-files': 'Files',
					'nav-settings': 'Settings',
					'stat-cpu': 'CPU Usage',
					'stat-memory': 'Memory Usage',
					'stat-disk': 'Disk Usage',
					'terminal-title': 'System Update',
					'user-role': 'Administrator',
					'clear': 'Clear',
					'update': 'Update',
					'dashboard-title': 'System Dashboard'
				},
				'zh-TW': {
					'nav-dashboard': '儀表板',
					'nav-system': '系統管理',
					'nav-network': '網路管理',
					'nav-services': '服務管理',
					'nav-files': '檔案管理',
					'nav-settings': '設定',
					'stat-cpu': 'CPU 使用率',
					'stat-memory': '記憶體使用率',
					'stat-disk': '磁碟使用率',
					'terminal-title': '系統更新',
					'user-role': '管理員',
					'clear': '清除',
					'update': '更新',
					'dashboard-title': '系統儀表板'

			function toggleTheme() {
				const html = document.documentElement;
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const isDark = html.classList.contains('dark-mode') || (!html.classList.contains('light-mode') && prefersDark);

				if (isDark) {
					html.classList.remove('dark-mode');
					html.classList.add('light-mode');
					document.querySelector('#themeToggle i').className = 'fas fa-moon';
					localStorage.setItem('theme-preference', 'light');
				} else {
					html.classList.remove('light-mode');
					html.classList.add('dark-mode');
					document.querySelector('#themeToggle i').className = 'fas fa-sun';
					localStorage.setItem('theme-preference', 'dark');
				}
			}

			class SystemMonitor {
				constructor() {
					this.terminal = document.getElementById('terminalOutput');
					this.progressBar = document.getElementById('updateProgress');
					this.updateButton = document.getElementById('updateButton');
					this.updateInterval = null;
				}

				async updateSystemStats() {
					try {
						const response = await fetch('/cgi-bin/panel.cgi/api/panel/system_info');
						const data = await response.json();

						document.getElementById('cpuUsage').textContent = `${data.cpu}%`;
						document.getElementById('memoryUsage').textContent = data.memory;
						document.getElementById('diskUsage').textContent = data.disk;
					} catch (error) {
						console.error('Error updating system stats:', error);
						document.getElementById('cpuUsage').textContent = '--';
						document.getElementById('memoryUsage').textContent = '--';
						document.getElementById('diskUsage').textContent = '--';
					}
				}

				async startUpdate() {
					try {
						this.updateButton.disabled = true;
						this.terminal.textContent = '';
						this.progressBar.style.width = '0%';

						const response = await fetch('/cgi-bin/panel.cgi/api/system/apt/update', {
							method: 'POST'
						});

						const reader = response.body.getReader();
						const decoder = new TextDecoder();
						let buffer = '';

						while (true) {
							const {value, done} = await reader.read();
							if (done) break;

							buffer += decoder.decode(value, {stream: true});
							const lines = buffer.split('\n');
							buffer = lines.pop() || '';

							for (const line of lines) {
								if (line.trim()) {
									this.appendToTerminal(line);
									this.updateProgress(line);
								}
							}
						}

						this.updateButton.disabled = false;
						await this.checkUpgradable();
					} catch (error) {
						console.error('Error:', error);
						this.appendToTerminal('更新失敗：' + error.message);
						this.updateButton.disabled = false;
					}
				}

				appendToTerminal(text) {
					const shouldScroll =
						this.terminal.scrollTop + this.terminal.clientHeight === this.terminal.scrollHeight;

					this.terminal.textContent += text + '\n';

					if (shouldScroll) {
						this.terminal.scrollTop = this.terminal.scrollHeight;
					}
				}

				updateProgress(line) {
					if (line.includes('Get:')) {
						const match = line.match(/Get:(\d+)/);
						if (match) {
							const current = parseInt(match[1]);
							const progress = (current / 10) * 100;
							this.progressBar.style.width = `${Math.min(progress, 100)}%`;
						}
					} else if (line.includes('Reading package lists...')) {
						this.progressBar.style.width = '90%';
					} else if (line.includes('Done')) {
						this.progressBar.style.width = '100%';
					}
				}

				async checkUpgradable() {
					try {
						const response = await fetch('/cgi-bin/panel.cgi/api/system/apt/upgradable');
						const data = await response.json();

						if (data.packages && data.packages.length > 0) {
							this.appendToTerminal('\n可更新的套件：');
							data.packages.forEach(pkg => {
								this.appendToTerminal(`${pkg.package} (${pkg.version})`);
							});
						} else {
							this.appendToTerminal('\n沒有可更新的套件');
						}
					} catch (error) {
						console.error('Error:', error);
						this.appendToTerminal('檢查更新失敗');
					}
				}

				clearTerminal() {
					this.terminal.textContent = '';
				}

				startMonitoring() {
					this.updateSystemStats();
					this.updateInterval = setInterval(() => this.updateSystemStats(), 5000);
				}

				stopMonitoring() {
					if (this.updateInterval) {
						clearInterval(this.updateInterval);
						this.updateInterval = null;
					}
				}
			}

			async function updateUsername() {
				try {
					const response = await fetch('/cgi-bin/auth.cgi?action=username');
					const data = await response.json();
					
					if (data.status === 'success' && data.code === '200') {
						document.getElementById('username').textContent = data.message;
					} else {
						window.location.href = '/';
					}
				} catch (error) {
					console.error('Error:', error);
					window.location.href = '/';
				}
			}

			async function handleLogout() {
				try {
					const response = await fetch('/cgi-bin/auth.cgi?action=logout');
					const data = await response.json();
					if (data.status === 'success') {
						window.location.href = '/';
					} else {
						console.error('Logout failed:', data.message);
						window.location.href = '/';
					}
				} catch (error) {
					console.error('Error logging out:', error);
					window.location.href = '/';
				}
			}

			const systemMonitor = new SystemMonitor();

			function startUpdate() {
				systemMonitor.startUpdate();
			}

			function clearTerminal() {
				systemMonitor.clearTerminal();
			}

			document.addEventListener('DOMContentLoaded', () => {
				updateTexts();
				updateUsername();
				systemMonitor.startMonitoring();

				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const savedTheme = localStorage.getItem('theme-preference');

				if (savedTheme) {
					document.documentElement.classList.add(`${savedTheme}-mode`);
					document.querySelector('#themeToggle i').className = `fas fa-${savedTheme === 'dark' ? 'sun' : 'moon'}`;
				} else if (prefersDark) {
					document.documentElement.classList.add('dark-mode');
					document.querySelector('#themeToggle i').className = 'fas fa-sun';
				}
			});

			window.addEventListener('beforeunload', () => {
				systemMonitor.stopMonitoring();
			});

			async function startUpdate() {
				const terminal = document.querySelector('.terminal-output');
				const progressBar = document.querySelector('.progress-fill');
				let isCompleted = false;

				while (!isCompleted) {
					try {
						const response = await fetch('/cgi-bin/panel.cgi/api/panel/system_update', {
							headers: {
								'Accept': 'application/json'
							}
						});

						if (!response.ok) {
							throw new Error(`HTTP error! status: ${response.status}`);
						}

						const text = await response.text();
						let data;
						try {
							data = JSON.parse(text);
						} catch (parseError) {
							console.error('JSON Parse Error:', parseError);
							console.log('Raw response:', text);
							const li = document.createElement('li');
							li.textContent = text;
							li.classList.add('error');
							terminal.appendChild(li);
							terminal.scrollTop = terminal.scrollHeight;
							continue;
						}

						const li = document.createElement('li');
						li.textContent = data.message;
						terminal.appendChild(li);
						terminal.scrollTop = terminal.scrollHeight;

						// 檢查狀態
						if (data.status === 'success') {
							// 更新進度條
							const match = data.message && data.message.match(/Command executed to (\d+)\/(\d+)/);
							if (match) {
								const [, current, total] = match;
								const progress = (current / total) * 100;
								progressBar.style.width = `${progress}%`;
							}
							
							// 如果是完成訊息，則結束執行
							if (data.message.trim() === 'All commands completed') {
								isCompleted = true;
								progressBar.style.width = '100%';
								console.log('Final response:', data);
								break;
							}
						} else if (data.status === 'error') {
							li.classList.add('error');
							console.log('Error response:', data);
							continue;
						}

						// 等待下一次請求
						await new Promise(resolve => setTimeout(resolve, 1000));
					} catch (error) {
						console.error('Fetch Error:', error);
						const li = document.createElement('li');
						li.textContent = `Error: ${error.message}`;
						li.classList.add('error');
						terminal.appendChild(li);
						terminal.scrollTop = terminal.scrollHeight;
						continue;
					}
				}
			}

			function clearTerminal() {
				document.querySelector('.terminal-output').textContent = '';
			}

			async function getUrlContent() {
				const terminal = document.querySelector('.terminal-output');
				const urlInput = document.getElementById('urlInput');
				const url = encodeURIComponent(urlInput.value.trim());

				if (!url) {
					const li = document.createElement('li');
					li.textContent = '請輸入有效的網址';
					li.classList.add('error');
					terminal.appendChild(li);
					terminal.scrollTop = terminal.scrollHeight;
					return;
				}

				try {
					const response = await fetch(`/cgi-bin/panel.cgi/api/panel/get?url=${url}`, {
						headers: {
							'Accept': 'text/plain'
						}
					});

					if (!response.ok) {
						throw new Error(`HTTP error! status: ${response.status}`);
					}

					const content = await response.text();
					const li = document.createElement('li');
					li.textContent = content;
					terminal.appendChild(li);
					terminal.scrollTop = terminal.scrollHeight;
				} catch (error) {
					console.error('Fetch Error:', error);
					const li = document.createElement('li');
					li.textContent = `Error: ${error.message}`;
					li.classList.add('error');
					terminal.appendChild(li);
					terminal.scrollTop = terminal.scrollHeight;
				}
			}
