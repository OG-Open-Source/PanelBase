<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易面板</title>
    <style>
        /* 基本樣式 */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f0f0f0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            background: #333;
            color: white;
            padding: 10px;
            margin: -20px -20px 20px -20px;
            border-radius: 5px 5px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-item {
            margin: 10px 0;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .button {
            background: #333;
            border: none;
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 3px;
            margin-left: 10px;
        }
        .button:hover {
            background: #444;
        }
        .logout-btn {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 3px;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            transition: background-color 0.3s ease;
            pointer-events: none;
        }
        .modal.show {
            display: block;
            background: rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            max-width: 400px;
            margin: 100px auto;
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .modal.show .modal-content {
            transform: translateY(0);
            opacity: 1;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
        }
        .error {
            color: #c0392b;
            margin-top: 5px;
            padding: 5px;
            background: #fde8e8;
            border-radius: 4px;
            display: none;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 4px;
            color: white;
            font-size: 0.9rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .toast.success {
            background-color: #27ae60;
        }
        .toast.error {
            background-color: #c0392b;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>簡易面板</h1>
            <div>
                <button class="button" onclick="showChangeUsername()">修改用戶名</button>
                <button class="button" onclick="showChangePassword()">修改密碼</button>
                <button class="logout-btn" onclick="handleLogout()">登出</button>
            </div>
        </div>

        <div class="info-item">
            <strong>CPU 使用率：</strong>
            <span id="cpu-usage">載入中...</span>
        </div>

        <div class="info-item">
            <strong>記憶體使用：</strong>
            <span id="memory-usage">載入中...</span>
        </div>

        <div class="info-item">
            <strong>磁碟使用：</strong>
            <span id="disk-usage">載入中...</span>
        </div>

        <div class="info-item">
            <strong>隨機數：</strong>
            <span id="random-number">載入中...</span>
        </div>

        <div class="info-item">
            <strong>Lighttpd 狀態：</strong>
            <span id="lighttpd-status">載入中...</span>
        </div>
    </div>

    <!-- 修改用戶名對話框 -->
    <div id="usernameModal" class="modal">
        <div class="modal-content">
            <h2>修改用戶名</h2>
            <div class="form-group">
                <label>新用戶名：</label>
                <input type="text" id="newUsername">
            </div>
            <div class="form-group">
                <label>確認密碼：</label>
                <input type="password" id="usernamePassword">
            </div>
            <div id="usernameError" class="error"></div>
            <button class="button" onclick="changeUsername()">確認</button>
            <button class="button" onclick="closeModal('usernameModal')">取消</button>
        </div>
    </div>

    <!-- 修改密碼對話框 -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h2>修改密碼</h2>
            <div class="form-group">
                <label>舊密碼：</label>
                <input type="password" id="oldPassword">
            </div>
            <div class="form-group">
                <label>新密碼：</label>
                <input type="password" id="newPassword">
            </div>
            <div id="passwordError" class="error"></div>
            <button class="button" onclick="changePassword()">確認</button>
            <button class="button" onclick="closeModal('passwordModal')">取消</button>
        </div>
    </div>

    <script>
        // 顯示提示訊息
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            // 強制重繪
            toast.offsetHeight;

            // 顯示
            toast.classList.add('show');

            // 3秒後移除
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 獲取用戶名
        async function fetchUsername() {
            try {
                const response = await fetch('/cgi-bin/auth.cgi?action=get_username');
                if (response.ok) {
                    const username = await response.text();
                    document.getElementById('username').textContent = username;
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('無法獲取用戶名', 'error');
            }
        }

        // 更新系統資訊
        async function updateSystemInfo() {
            try {
                const response = await fetch('/cgi-bin/panel.cgi?action=get_system_info');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('cpu-usage').textContent = data.cpu + '%';
                    document.getElementById('memory-usage').textContent = data.memory;
                    document.getElementById('disk-usage').textContent = data.disk;
                    document.getElementById('random-number').textContent = data.random;
                    document.getElementById('lighttpd-status').textContent = data.lighttpd_status;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // 處理登出
        async function handleLogout() {
            try {
                const response = await fetch('/cgi-bin/auth.cgi?action=logout');
                const data = await response.json();
                if (response.ok && data.status === 0) {
                    showToast('登出成功', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    throw new Error('Logout failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('登出失敗', 'error');
            }
        }

        // 顯示修改用���名對話框
        function showChangeUsername() {
            const modal = document.getElementById('usernameModal');
            modal.style.display = 'block';
            // 強制重繪
            modal.offsetHeight;
            modal.classList.add('show');
            document.getElementById('usernameError').style.display = 'none';
            document.getElementById('newUsername').value = '';
            document.getElementById('usernamePassword').value = '';
        }

        // 顯示修改密碼對話框
        function showChangePassword() {
            const modal = document.getElementById('passwordModal');
            modal.style.display = 'block';
            // 強制重繪
            modal.offsetHeight;
            modal.classList.add('show');
            document.getElementById('passwordError').style.display = 'none';
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
        }

        // 關閉對話框
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        // 修改用戶名
        async function changeUsername() {
            const newUsername = document.getElementById('newUsername').value;
            const password = document.getElementById('usernamePassword').value;
            const errorElement = document.getElementById('usernameError');

            try {
                const response = await fetch('/cgi-bin/auth.cgi?action=change_username', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `new_username=${encodeURIComponent(newUsername)}&password=${encodeURIComponent(password)}`
                });

                const data = await response.json();
                if (response.ok && data.status === 0) {
                    closeModal('usernameModal');
                    showToast('用戶名修改成功', 'success');
                    fetchUsername();
                } else {
                    let message = '發生錯誤';
                    switch (data.status) {
                        case 1:
                            message = '用戶名已存在';
                            break;
                        case 2:
                            message = '密碼錯誤';
                            break;
                        case 3:
                            message = '未授權訪問';
                            break;
                    }
                    errorElement.textContent = message;
                    errorElement.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                errorElement.textContent = '發生錯誤';
                errorElement.style.display = 'block';
            }
        }

        // 修改密碼
        async function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const errorElement = document.getElementById('passwordError');

            if (newPassword.length < 6) {
                errorElement.textContent = '新密碼長度必須至少為 6 個字符';
                errorElement.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/cgi-bin/auth.cgi?action=change_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `old_password=${encodeURIComponent(oldPassword)}&new_password=${encodeURIComponent(newPassword)}`
                });

                const data = await response.json();
                if (response.ok && data.status === 0) {
                    closeModal('passwordModal');
                    showToast('密碼修改成功', 'success');
                } else {
                    let message = '發生錯誤';
                    switch (data.status) {
                        case 1:
                            message = '舊密碼錯誤';
                            break;
                        case 2:
                            message = '未授權訪問';
                            break;
                    }
                    errorElement.textContent = message;
                    errorElement.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                errorElement.textContent = '發生錯誤';
                errorElement.style.display = 'block';
            }
        }

        // 初始化
        updateSystemInfo();

        // 每秒更新一次資訊
        setInterval(updateSystemInfo, 1000);

        // 點擊對話框外部時關閉對話框
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal(event.target.id);
            }
        }
    </script>
</body>
</html>
