<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>404 Not Found - PanelBase</title>
		<link rel="icon" href="favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
		<style>
			:root {
				--primary-color: #007AFF;
				--primary-gradient: linear-gradient(135deg, #0A84FF, #0066CC);
				--error-color: #FF3B30;
				--background-color: #F2F2F7;
				--text-color: #1C1C1E;
				--secondary-text: #8E8E93;
				--border-radius: 12px;
				--border-radius-lg: 16px;
				--border-radius-sm: 8px;
				--container-bg: rgba(255, 255, 255, 0.95);
				--container-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
				--body-gradient: linear-gradient(135deg, #F6F8FB, #E9EEF3);
				--primary-rgb: 0, 122, 255;
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			}

			body {
				background: var(--body-gradient);
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 20px;
				position: relative;
				overflow: hidden;
				isolation: isolate;
			}

			body::before {
				content: '';
				position: absolute;
				width: 150%;
				height: 150%;
				background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
				animation: rotate 20s linear infinite;
				z-index: 0;
			}

			body::after {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background:
					linear-gradient(45deg, transparent 45%, rgba(var(--primary-rgb), 0.03) 50%, transparent 55%),
					linear-gradient(-45deg, transparent 45%, rgba(var(--primary-rgb), 0.03) 50%, transparent 55%);
				background-size: 30px 30px;
				animation: backgroundMove 60s linear infinite;
				z-index: 0;
			}

			.container {
				width: 100%;
				max-width: 380px;
				padding: 32px;
				background: var(--container-bg);
				border-radius: var(--border-radius-lg);
				box-shadow: var(--container-shadow);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				position: relative;
				z-index: 1;
				text-align: center;
			}

			.error-code {
				font-size: 96px;
				font-weight: 700;
				background: var(--primary-gradient);
				background-clip: text;
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				margin-bottom: 12px;
				letter-spacing: -0.5px;
				line-height: 1;
			}

			.error-message {
				font-size: 24px;
				color: var(--text-color);
				margin-bottom: 24px;
				font-weight: 600;
			}

			.error-description {
				color: var(--secondary-text);
				margin-bottom: 32px;
				line-height: 1.5;
			}

			.back-button {
				display: inline-block;
				padding: 12px 24px;
				background: var(--primary-gradient);
				color: white;
				text-decoration: none;
				border-radius: var(--border-radius);
				font-weight: 600;
				transition: all 0.3s ease;
				position: relative;
				overflow: hidden;
			}

			.back-button::before {
				content: '';
				position: absolute;
				top: 0;
				left: -100%;
				width: 200%;
				height: 100%;
				background: linear-gradient(
					120deg,
					transparent 0%,
					transparent 25%,
					rgba(255, 255, 255, 0.3) 45%,
					rgba(255, 255, 255, 0.7) 50%,
					rgba(255, 255, 255, 0.3) 55%,
					transparent 75%,
					transparent 100%
				);
				transform: skewX(-25deg);
				animation: shine 8s infinite;
			}

			.back-button:hover {
				transform: translateY(-2px);
				box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
			}

			.back-button:active {
				transform: translateY(0);
			}

			@keyframes shine {
				0% { left: -200%; }
				20%, 100% { left: 200%; }
			}

			@keyframes rotate {
				from { transform: rotate(0deg); }
				to { transform: rotate(360deg); }
			}

			@keyframes backgroundMove {
				from { background-position: 0 0; }
				to { background-position: 100% 100%; }
			}

			.background-shapes {
				position: absolute;
				width: 100%;
				height: 100%;
				pointer-events: none;
			}

			.shape {
				position: absolute;
				background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.2), transparent);
				backdrop-filter: blur(8px);
			}

			.shape-1 {
				width: 120px;
				height: 120px;
				left: -60px;
				top: 50%;
				transform: rotate(45deg) translateY(-50%);
				animation: shapeFloat1 12s ease-in-out infinite;
			}

			.shape-2 {
				width: 80px;
				height: 80px;
				right: -40px;
				top: 30%;
				border-radius: 50%;
				animation: shapeFloat2 15s ease-in-out infinite;
			}

			.shape-3 {
				width: 60px;
				height: 60px;
				left: 15%;
				bottom: 10%;
				border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
				animation: shapeFloat3 10s ease-in-out infinite, shapeRotate 20s linear infinite;
			}

			.shape-4 {
				width: 40px;
				height: 40px;
				right: 15%;
				top: 15%;
				clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
				animation: shapeFloat4 8s ease-in-out infinite;
			}

			@keyframes shapeFloat1 {
				0%, 100% { transform: rotate(45deg) translateY(-50%) translateX(0); }
				50% { transform: rotate(45deg) translateY(-50%) translateX(30px); }
			}

			@keyframes shapeFloat2 {
				0%, 100% { transform: translateY(0) scale(1); }
				50% { transform: translateY(-30px) scale(1.1); }
			}

			@keyframes shapeFloat3 {
				0%, 100% { transform: translate(0, 0); }
				50% { transform: translate(20px, -20px); }
			}

			@keyframes shapeFloat4 {
				0%, 100% { transform: translate(0, 0) rotate(0deg); }
				50% { transform: translate(-15px, 15px) rotate(180deg); }
			}

			@keyframes shapeRotate {
				from { transform: rotate(0deg); }
				to { transform: rotate(360deg); }
			}

			:root.dark-mode {
				--background-color: #000000;
				--text-color: #FFFFFF;
				--secondary-text: #8E8E93;
				--container-bg: rgba(28, 28, 30, 0.95);
				--container-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
				--body-gradient: linear-gradient(135deg, #1C1C1E, #2C2C2E);
				--primary-rgb: 10, 132, 255;
			}

			:root.dark-mode body {
				background: var(--body-gradient);
			}

			:root.dark-mode .container {
				background: var(--container-bg);
				color: var(--text-color);
			}

			:root.dark-mode body::before {
				background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
			}

			@media (prefers-color-scheme: dark) {
				:root:not(.light-mode) {
					--background-color: #000000;
					--text-color: #FFFFFF;
					--secondary-text: #8E8E93;
					--container-bg: rgba(28, 28, 30, 0.95);
					--container-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
					--body-gradient: linear-gradient(135deg, #1C1C1E, #2C2C2E);
					--primary-rgb: 10, 132, 255;
				}

				:root:not(.light-mode) body {
					background: var(--body-gradient);
				}

				:root:not(.light-mode) .container {
					background: var(--container-bg);
					color: var(--text-color);
				}
			}

			@media (max-width: 480px) {
				body {
					padding: 0;
					background: var(--container-bg);
				}

				.container {
					max-width: 100%;
					margin: 0;
					padding: 20px;
					min-height: 100vh;
					border-radius: 0;
					box-shadow: none;
				}

				.background-shapes {
					display: none;
				}

				body::before,
				body::after {
					display: none;
				}
			}

			.footer {
				position: fixed;
				bottom: 20px;
				left: 50%;
				transform: translateX(-50%);
				color: var(--secondary-text);
				font-size: 12px;
				opacity: 0.9;
				transition: all 0.3s ease;
				white-space: nowrap;
				background: var(--container-bg);
				padding: 8px 16px;
				border-radius: var(--border-radius);
				box-shadow: var(--container-shadow);
				backdrop-filter: blur(8px);
				z-index: 2;
			}

			.footer:hover {
				opacity: 1;
				transform: translateX(-50%) translateY(-2px);
			}

			.footer a {
				color: var(--primary-color);
				text-decoration: none;
				font-weight: 500;
				transition: all 0.3s ease;
			}

			.footer a:hover {
				text-decoration: underline;
				opacity: 0.9;
			}

			.language-switcher {
				margin-top: 24px;
				text-align: center;
				display: flex;
				justify-content: center;
				gap: 8px;
			}

			.language-switcher button {
				background: none;
				border: 2px solid transparent;
				padding: 6px 12px;
				color: var(--secondary-text);
				font-size: 14px;
				cursor: pointer;
				transition: all 0.2s ease;
				border-radius: var(--border-radius-sm);
			}

			.language-switcher button:hover {
				background: rgba(0, 122, 255, 0.1);
				color: var(--primary-color);
			}

			.language-switcher button[data-active="true"] {
				border-color: var(--primary-color);
				color: var(--primary-color);
			}

			.theme-switcher {
				position: absolute;
				top: 20px;
				right: 20px;
				z-index: 2;
			}

			.theme-switcher button {
				background: none;
				border: none;
				color: var(--secondary-text);
				font-size: 18px;
				cursor: pointer;
				padding: 8px;
				border-radius: var(--border-radius-sm);
				transition: all 0.3s ease;
				width: 36px;
				height: 36px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.theme-switcher button i {
				width: 18px;
				text-align: center;
			}

			.theme-switcher button:hover {
				background: rgba(0, 122, 255, 0.1);
				color: var(--primary-color);
			}
		</style>
		<script>
			(function() {
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const savedTheme = localStorage.getItem('theme-preference');

				if (savedTheme) {
					document.documentElement.classList.add(`${savedTheme}-mode`);
				} else if (prefersDark) {
					document.documentElement.classList.add('dark-mode');
				}
			})();
		</script>
	</head>
	<body>
		<div class="background-shapes">
			<div class="shape shape-1"></div>
			<div class="shape shape-2"></div>
			<div class="shape shape-3"></div>
			<div class="shape shape-4"></div>
		</div>
		<div class="container">
			<div class="theme-switcher">
				<button onclick="toggleTheme()" id="themeToggle">
					<i class="fas fa-moon"></i>
				</button>
			</div>
			<div class="error-code">404</div>
			<h1 class="error-message" data-i18n="error-title">Page Not Found</h1>
			<p class="error-description" data-i18n="error-description">
				The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
			</p>
			<a href="/panel.html" class="back-button" data-i18n="back-button">Back to Home</a>
			<div class="language-switcher">
				<button onclick="changeLanguage('en')" data-lang="en">EN</button>
				<button onclick="changeLanguage('zh-TW')" data-lang="zh-TW">繁</button>
				<button onclick="changeLanguage('zh-CN')" data-lang="zh-CN">简</button>
			</div>
		</div>

		<div class="footer">
			Powered by <a href="https://github.com/OG-Open-Source" target="_blank">OG Open Source</a>
		</div>

		<script>
			const i18n = {
				'en': {
					'error-title': 'Page Not Found',
					'error-description': 'The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.',
					'back-button': 'Back to Home'
				},
				'zh-TW': {
					'error-title': '找不到頁面',
					'error-description': '您要看的頁面可能已被移除、更名或暫時無法使用',
					'back-button': '返回首頁'
				},
				'zh-CN': {
					'error-title': '找不到页面',
					'error-description': '您要查看的页面可能已被移除、更名或暂时无法使用',
					'back-button': '返回首页'
				}
			};

			function getBrowserLanguage() {
				const lang = navigator.language || navigator.userLanguage;
				if (lang.startsWith('zh')) {
					return lang === 'zh-TW' ? 'zh-TW' : 'zh-CN';
				}
				return 'en';
			}

			let currentLanguage = localStorage.getItem('panelbase-language') || getBrowserLanguage();

			function updateTexts() {
				document.querySelectorAll('[data-i18n]').forEach(element => {
					const key = element.getAttribute('data-i18n');
					element.textContent = i18n[currentLanguage][key];
				});
				document.documentElement.lang = currentLanguage;

				document.querySelectorAll('[data-lang]').forEach(button => {
					button.setAttribute('data-active', button.getAttribute('data-lang') === currentLanguage);
				});
			}

			function changeLanguage(lang) {
				currentLanguage = lang;
				localStorage.setItem('panelbase-language', lang);
				updateTexts();
			}

			updateTexts();

			function toggleTheme() {
				const html = document.documentElement;
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const isDark = html.classList.contains('dark-mode') || (!html.classList.contains('light-mode') && prefersDark);

				if (isDark) {
					html.classList.remove('dark-mode');
					html.classList.add('light-mode');
					document.querySelector('#themeToggle i').className = 'fas fa-moon';
					localStorage.setItem('theme-preference', 'light');
				} else {
					html.classList.remove('light-mode');
					html.classList.add('dark-mode');
					document.querySelector('#themeToggle i').className = 'fas fa-sun';
					localStorage.setItem('theme-preference', 'dark');
				}
			}

			document.addEventListener('DOMContentLoaded', function() {
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const savedTheme = localStorage.getItem('theme-preference');

				if (savedTheme) {
					document.documentElement.classList.add(`${savedTheme}-mode`);
					document.querySelector('#themeToggle i').className = `fas fa-${savedTheme === 'dark' ? 'sun' : 'moon'}`;
				} else if (prefersDark) {
					document.documentElement.classList.add('dark-mode');
					document.querySelector('#themeToggle i').className = 'fas fa-sun';
				}
			});
		</script>
	</body>
</html>
