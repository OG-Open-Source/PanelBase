<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PanelBase 登入</title>
	<style>
		:root {
			--bg-color: #f5f5f5;
			--card-bg: #ffffff;
			--text-color: #333333;
			--border-color: #e0e0e0;
			--input-bg: #ffffff;
			--input-border: #cccccc;
			--button-bg: #2c3e50;
			--button-hover: #34495e;
			--error-color: #e74c3c;
			--shadow-color: rgba(0, 0, 0, 0.1);
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--bg-color: #1a1a1a;
				--card-bg: #2d2d2d;
				--text-color: #e0e0e0;
				--border-color: #404040;
				--input-bg: #3d3d3d;
				--input-border: #505050;
				--button-bg: #3498db;
				--button-hover: #2980b9;
				--error-color: #e74c3c;
				--shadow-color: rgba(0, 0, 0, 0.3);
			}
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			transition: background-color 0.3s, color 0.3s;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			background-color: var(--bg-color);
			color: var(--text-color);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}

		.login-container {
			background-color: var(--card-bg);
			padding: 2rem;
			border-radius: 12px;
			box-shadow: 0 8px 24px var(--shadow-color);
			width: 100%;
			max-width: 400px;
			animation: fadeIn 0.5s ease-out;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(-20px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.login-header {
			text-align: center;
			margin-bottom: 2rem;
		}

		.login-header h1 {
			font-size: 2rem;
			font-weight: 600;
			margin-bottom: 0.5rem;
			color: var(--text-color);
		}

		.login-header p {
			color: var(--text-color);
			opacity: 0.8;
		}

		.form-group {
			margin-bottom: 1.5rem;
		}

		.form-group label {
			display: block;
			margin-bottom: 0.5rem;
			color: var(--text-color);
			font-weight: 500;
		}

		.form-group input {
			width: 100%;
			padding: 0.75rem 1rem;
			border: 1px solid var(--input-border);
			border-radius: 6px;
			background-color: var(--input-bg);
			color: var(--text-color);
			font-size: 1rem;
			transition: all 0.3s ease;
		}

		.form-group input:focus {
			outline: none;
			border-color: var(--button-bg);
			box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
		}

		.error-message {
			color: var(--error-color);
			font-size: 0.9rem;
			margin-top: 0.5rem;
			display: none;
		}

		.submit-button {
			width: 100%;
			padding: 0.75rem;
			background-color: var(--button-bg);
			color: white;
			border: none;
			border-radius: 6px;
			font-size: 1rem;
			font-weight: 500;
			cursor: pointer;
			transition: all 0.3s ease;
		}

		.submit-button:hover {
			background-color: var(--button-hover);
			transform: translateY(-1px);
		}

		.submit-button:active {
			transform: translateY(0);
		}

		@media (max-width: 480px) {
			.login-container {
				padding: 1.5rem;
			}

			.login-header h1 {
				font-size: 1.75rem;
			}
		}
	</style>
</head>
<body>
	<div class="login-container">
		<div class="login-header">
			<h1>PanelBase</h1>
			<p>請登入以繼續</p>
		</div>
		<form id="loginForm" onsubmit="handleLogin(event)">
			<div class="form-group">
				<label for="username">用戶名</label>
				<input type="text" id="username" name="username" required autocomplete="username">
			</div>
			<div class="form-group">
				<label for="password">密碼</label>
				<input type="password" id="password" name="password" required autocomplete="current-password">
				<div id="errorMessage" class="error-message"></div>
			</div>
			<button type="submit" class="submit-button">登入</button>
		</form>
	</div>

	<script>
		async function handleLogin(event) {
			event.preventDefault();
			const errorMessage = document.getElementById('errorMessage');
			const submitButton = document.querySelector('.submit-button');
			
			try {
				submitButton.disabled = true;
				submitButton.textContent = '登入中...';
				
				const username = document.getElementById('username').value;
				const password = document.getElementById('password').value;
				
				const response = await fetch('/cgi-bin/auth.cgi?action=login', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded',
					},
					body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
				});

				const data = await response.json();
				
				if (response.ok && data === 0) {
					window.location.href = '/panel.html';
				} else {
					errorMessage.textContent = '用戶名或密碼錯誤';
					errorMessage.style.display = 'block';
					submitButton.disabled = false;
					submitButton.textContent = '登入';
					
					// 輕微震動效果
					const form = document.getElementById('loginForm');
					form.style.animation = 'shake 0.5s';
					setTimeout(() => form.style.animation = '', 500);
				}
			} catch (error) {
				console.error('Error:', error);
				errorMessage.textContent = '發生錯誤，請稍後再試';
				errorMessage.style.display = 'block';
				submitButton.disabled = false;
				submitButton.textContent = '登入';
			}
		}


		const style = document.createElement('style');
		style.textContent = `
			@keyframes shake {
				0%, 100% { transform: translateX(0); }
				25% { transform: translateX(-5px); }
				75% { transform: translateX(5px); }
			}
		`;
		document.head.appendChild(style);
	</script>
</body>
</html>
