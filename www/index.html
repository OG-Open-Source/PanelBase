<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PanelBase Login</title>
	<style>
		:root {
			--bg-color: #f5f5f5;
			--card-bg: #ffffff;
			--text-color: #333333;
			--border-color: #e0e0e0;
			--input-bg: #ffffff;
			--input-border: #cccccc;
			--button-bg: #2c3e50;
			--button-hover: #34495e;
			--error-color: #e74c3c;
			--shadow-color: rgba(0, 0, 0, 0.1);
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--bg-color: #1a1a1a;
				--card-bg: #2d2d2d;
				--text-color: #e0e0e0;
				--border-color: #404040;
				--input-bg: #3d3d3d;
				--input-border: #505050;
				--button-bg: #3498db;
				--button-hover: #2980b9;
				--error-color: #e74c3c;
				--shadow-color: rgba(0, 0, 0, 0.3);
			}
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			transition: background-color 0.3s, color 0.3s;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			background-color: var(--bg-color);
			color: var(--text-color);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}

		.login-container {
			background-color: var(--card-bg);
			padding: 2rem;
			border-radius: 12px;
			box-shadow: 0 8px 24px var(--shadow-color);
			width: 100%;
			max-width: 400px;
			animation: fadeIn 0.5s ease-out;
			position: relative;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(-20px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.login-header {
			text-align: center;
			margin-bottom: 2rem;
		}

		.login-header h1 {
			font-size: 2rem;
			font-weight: 600;
			margin-bottom: 0.5rem;
			color: var(--text-color);
		}

		.login-header p {
			color: var(--text-color);
			opacity: 0.8;
		}

		.form-group {
			margin-bottom: 1.5rem;
		}

		.form-group label {
			display: block;
			margin-bottom: 0.5rem;
			color: var(--text-color);
			font-weight: 500;
		}

		.form-group input {
			width: 100%;
			padding: 0.75rem 1rem;
			border: 1px solid var(--input-border);
			border-radius: 6px;
			background-color: var(--input-bg);
			color: var(--text-color);
			font-size: 1rem;
			transition: all 0.3s ease;
		}

		.form-group input:focus {
			outline: none;
			border-color: var(--button-bg);
			box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
		}

		.error-message {
			color: var(--error-color);
			font-size: 0.9rem;
			margin-top: 0.5rem;
			display: none;
		}

		.submit-button {
			width: 100%;
			padding: 0.75rem;
			background-color: var(--button-bg);
			color: white;
			border: none;
			border-radius: 6px;
			font-size: 1rem;
			font-weight: 500;
			cursor: pointer;
			transition: all 0.3s ease;
		}

		.submit-button:hover {
			background-color: var(--button-hover);
			transform: translateY(-1px);
		}

		.submit-button:active {
			transform: translateY(0);
		}

		.language-selector {
			position: absolute;
			top: 1rem;
			right: 1rem;
			display: flex;
			gap: 0.5rem;
		}

		.language-button {
			background: none;
			border: 1px solid var(--border-color);
			color: var(--text-color);
			padding: 0.25rem 0.5rem;
			border-radius: 4px;
			cursor: pointer;
			font-size: 0.8rem;
			transition: all 0.3s ease;
		}

		.language-button:hover {
			background-color: var(--button-bg);
			color: white;
			border-color: var(--button-bg);
		}

		.language-button.active {
			background-color: var(--button-bg);
			color: white;
			border-color: var(--button-bg);
		}

		@media (max-width: 480px) {
			.login-container {
				padding: 1.5rem;
			}

			.login-header h1 {
				font-size: 1.75rem;
			}

			.language-selector {
				position: relative;
				top: 0;
				right: 0;
				justify-content: center;
				margin-bottom: 1rem;
			}
		}
	</style>
</head>
<body>
	<div class="login-container">
		<div class="language-selector">
			<button class="language-button" onclick="changeLanguage('en')" data-lang="en">EN</button>
			<button class="language-button active" onclick="changeLanguage('zh-TW')" data-lang="zh-TW">繁</button>
			<button class="language-button" onclick="changeLanguage('zh-CN')" data-lang="zh-CN">简</button>
		</div>
		<div class="login-header">
			<h1>PanelBase</h1>
			<p data-i18n="login-prompt">請登入以繼續</p>
		</div>
		<form id="loginForm" onsubmit="handleLogin(event)">
			<div class="form-group">
				<label for="username" data-i18n="username">用戶名</label>
				<input type="text" id="username" name="username" required autocomplete="username">
			</div>
			<div class="form-group">
				<label for="password" data-i18n="password">密碼</label>
				<input type="password" id="password" name="password" required autocomplete="current-password">
				<div id="errorMessage" class="error-message"></div>
			</div>
			<button type="submit" class="submit-button" data-i18n="login-button">登入</button>
		</form>
	</div>

	<script>
		const i18n = {
			'en': {
				'login-prompt': 'Please login to continue',
				'username': 'Username',
				'password': 'Password',
				'login-button': 'Login',
				'logging-in': 'Logging in...',
				'error-invalid': 'Invalid username or password',
				'error-server': 'Server error, please try again later'
			},
			'zh-TW': {
				'login-prompt': '請登入以繼續',
				'username': '用戶名',
				'password': '密碼',
				'login-button': '登入',
				'logging-in': '登入中...',
				'error-invalid': '用戶名或密碼錯誤',
				'error-server': '發生錯誤，請稍後再試'
			},
			'zh-CN': {
				'login-prompt': '请登录以继续',
				'username': '用户名',
				'password': '密码',
				'login-button': '登录',
				'logging-in': '登录中...',
				'error-invalid': '用户名或密码错误',
				'error-server': '发生错误，请稍后再试'
			}
		};

		function getBrowserLanguage() {
			const lang = navigator.language || navigator.userLanguage;
			if (lang.startsWith('zh')) {
				return lang === 'zh-TW' ? 'zh-TW' : 'zh-CN';
			}
			return 'en';
		}

		let currentLanguage = localStorage.getItem('panelbase-language') || getBrowserLanguage();

		function updateTexts() {
			document.querySelectorAll('[data-i18n]').forEach(element => {
				const key = element.getAttribute('data-i18n');
				element.textContent = i18n[currentLanguage][key];
			});
			document.documentElement.lang = currentLanguage;
		}

		function changeLanguage(lang) {
			currentLanguage = lang;
			localStorage.setItem('panelbase-language', lang);
			updateTexts();
			
			document.querySelectorAll('.language-button').forEach(button => {
				button.classList.toggle('active', button.getAttribute('data-lang') === lang);
			});
		}

		async function handleLogin(event) {
			event.preventDefault();
			const errorMessage = document.getElementById('errorMessage');
			const submitButton = document.querySelector('.submit-button');
			
			try {
				submitButton.disabled = true;
				submitButton.textContent = i18n[currentLanguage]['logging-in'];
				
				const username = document.getElementById('username').value;
				const password = document.getElementById('password').value;
				
				const response = await fetch('/cgi-bin/auth.cgi?action=login', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded',
					},
					body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
				});

				const data = await response.json();
				
				if (response.ok && data === 0) {
					window.location.href = '/panel.html';
				} else {
					errorMessage.textContent = i18n[currentLanguage]['error-invalid'];
					errorMessage.style.display = 'block';
					submitButton.disabled = false;
					submitButton.textContent = i18n[currentLanguage]['login-button'];
					
					// 輕微震動效果
					const form = document.getElementById('loginForm');
					form.style.animation = 'shake 0.5s';
					setTimeout(() => form.style.animation = '', 500);
				}
			} catch (error) {
				console.error('Error:', error);
				errorMessage.textContent = i18n[currentLanguage]['error-server'];
				errorMessage.style.display = 'block';
				submitButton.disabled = false;
				submitButton.textContent = i18n[currentLanguage]['login-button'];
			}
		}

		const style = document.createElement('style');
		style.textContent = `
			@keyframes shake {
				0%, 100% { transform: translateX(0); }
				25% { transform: translateX(-5px); }
				75% { transform: translateX(5px); }
			}
		`;
		document.head.appendChild(style);

		changeLanguage(currentLanguage);
	</script>
</body>
</html>
