# routes.conf
# 格式：路徑 方法 命令
# 變數說明：
# $1, $2, ... - URL 參數 (例如：/api/user/$1 中的 $1)
# %1, %2, ... - POST 參數 (按順序對應 POST 數據)

# 系統資訊
/api/system/info GET bash -c '
    echo "{"
    echo "  \"hostname\": \"$(hostname)\","
    echo "  \"os\": \"$(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d \"\\\"\")\","
    echo "  \"kernel\": \"$(uname -r)\","
    echo "  \"uptime\": \"$(uptime -p)\","
    echo "  \"cpu_usage\": \"$(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk "{print 100 - \$1}")%\","
    echo "  \"memory_total\": \"$(free -h | grep "Mem:" | awk "{print \$2}")\","
    echo "  \"memory_used\": \"$(free -h | grep "Mem:" | awk "{print \$3}")\","
    echo "  \"disk_usage\": \"$(df -h / | tail -n1 | awk "{print \$5}")\""
    echo "}"
'

# 服務管理
/api/service/status/$1 GET systemctl is-active $1
/api/service/start/$1 POST systemctl start $1
/api/service/stop/$1 POST systemctl stop $1
/api/service/restart/$1 POST systemctl restart $1
/api/service/enable/$1 POST systemctl enable $1
/api/service/disable/$1 POST systemctl disable $1
/api/service/list GET systemctl list-units --type=service --no-pager | grep .service

# 進程管理
/api/process/list GET ps aux --no-headers
/api/process/kill/$1 POST kill -9 $1
/api/process/top GET top -bn1

# 用戶管理
# 列出用戶
/api/user/list GET bash -c '
    echo "Content-type: application/json"
    echo
    echo "{"
    echo "  \"success\": true,"
    echo "  \"data\": ["
    # 使用 awk 過濾出真實用戶（排除系統用戶）
    awk -F: '"'"'$7 != "/sbin/nologin" && $7 != "/bin/false" {
        printf "    {"
        printf "\"username\": \"%s\", ", $1
        printf "\"uid\": \"%s\", ", $3
        printf "\"home\": \"%s\", ", $6
        printf "\"shell\": \"%s\"", $7
        print "},"
    }'"'"' /etc/passwd | sed '"'"'$s/,//'"'"'
    echo "  ]"
    echo "}"
'
/api/user/add POST bash -c '
    echo "==== 開始創建用戶 $1 ===="
    if id "$1" >/dev/null 2>&1; then
        echo "錯誤：用戶已存在"
        exit 1
    fi
    useradd "$1" && echo "$1:$%1" | chpasswd
    echo "用戶 $1 創建成功"
'
/api/user/delete/$1 POST userdel -r $1
/api/user/password POST bash -c '
    echo "==== 修改用戶 $1 密碼 ===="
    if ! id "$1" >/dev/null 2>&1; then
        echo "錯誤：用戶不存在"
        exit 1
    fi
    echo "$1:$%1" | chpasswd
    echo "密碼修改成功"
'

# 網絡工具
/api/network/interfaces GET ip addr show
/api/network/connections GET netstat -tuln
/api/network/ping/$1 GET ping -c 4 $1
/api/network/dns/$1 GET nslookup $1
/api/network/trace/$1 GET traceroute $1

# 檔案系統
/api/fs/list GET bash -c '
    echo "{"
    echo "  \"disks\": ["
    lsblk -J
    echo "  ],"
    echo "  \"mounts\": ["
    df -h -x tmpfs -x devtmpfs | tail -n +2 | awk "{printf \"    {\\\"mount\\\": \\\"%s\\\", \\\"size\\\": \\\"%s\\\", \\\"used\\\": \\\"%s\\\", \\\"avail\\\": \\\"%s\\\", \\\"use_percent\\\": \\\"%s\\\"},\\n\", \$6, \$2, \$3, \$4, \$5}"
    echo "  ]"
    echo "}"
'
/api/fs/space GET df -h
/api/fs/inodes GET df -i

# 日誌查看
/api/logs/system GET journalctl -n 100 --no-pager
/api/logs/auth GET tail -n 100 /var/log/auth.log
/api/logs/custom/$1 GET tail -n 100 $1

# 防火牆管理
/api/firewall/status GET ufw status
/api/firewall/enable POST ufw enable
/api/firewall/disable POST ufw disable
/api/firewall/allow/$1 POST ufw allow $1
/api/firewall/deny/$1 POST ufw deny $1

# 系統更新
/api/system/updates GET apt list --upgradable 2>/dev/null
/api/system/update POST bash -c '
    echo "==== 開始系統更新 ===="
    echo "1. 更新套件清單..."
    apt update
    echo "2. 安裝更新..."
    apt upgrade -y
    echo "3. 清理不需要的套件..."
    apt autoremove -y
    echo "==== 更新完成 ===="
'

# 備份
/api/backup/create/$1 POST bash -c '
    BACKUP_DIR="/opt/panelbase/backups"
    mkdir -p "$BACKUP_DIR"
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    tar -czf "$BACKUP_DIR/$1_$TIMESTAMP.tar.gz" $%1
    echo "備份已創建：$1_$TIMESTAMP.tar.gz"
'
/api/backup/list GET ls -l /opt/panelbase/backups
/api/backup/delete/$1 POST rm -f "/opt/panelbase/backups/$1"

# 資料庫管理 (MySQL 示例)
/api/mysql/status GET systemctl status mysql
/api/mysql/databases GET mysql -N -e "SHOW DATABASES"
/api/mysql/create/$1 POST mysql -e "CREATE DATABASE $1"
/api/mysql/drop/$1 POST mysql -e "DROP DATABASE $1"

# Docker 管理
/api/docker/status GET docker info
/api/docker/containers GET docker ps -a
/api/docker/images GET docker images
/api/docker/start/$1 POST docker start $1
/api/docker/stop/$1 POST docker stop $1
/api/docker/restart/$1 POST docker restart $1

# 自定義命令
/api/custom/date GET date "+%Y-%m-%d %H:%M:%S"
/api/custom/random GET od -An -N2 -i /dev/urandom
/api/custom/shell POST bash -c "$%1"