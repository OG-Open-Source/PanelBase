# routes.conf
# 格式：路徑 方法 命令
# 變數說明：
# $1, $2, ... - URL 參數 (例如：/api/user/$1 中的 $1)
# %1, %2, ... - POST 參數 (按順序對應 POST 數據)

# 系統資訊
/api/system/info GET bash -c '
    echo "{"
    echo "  \"hostname\": \"$(hostname)\","
    echo "  \"os\": \"$(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d \"\\\"\")\","
    echo "  \"kernel\": \"$(uname -r)\","
    echo "  \"uptime\": \"$(uptime -p)\","
    echo "  \"cpu_usage\": \"$(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk "{print 100 - \$1}")%\","
    echo "  \"memory_total\": \"$(free -h | grep "Mem:" | awk "{print \$2}")\","
    echo "  \"memory_used\": \"$(free -h | grep "Mem:" | awk "{print \$3}")\","
    echo "  \"disk_usage\": \"$(df -h / | tail -n1 | awk "{print \$5}")\""
    echo "}"
'

# 服務管理
/api/service/status/$1 GET systemctl is-active $1
/api/service/start/$1 POST systemctl start $1
/api/service/stop/$1 POST systemctl stop $1
/api/service/restart/$1 POST systemctl restart $1
/api/service/enable/$1 POST systemctl enable $1
/api/service/disable/$1 POST systemctl disable $1
/api/service/list GET systemctl list-units --type=service --no-pager | grep .service

# 進程管理
/api/process/list GET bash -c '
    echo "Content-type: application/json"
    echo
    echo "{"
    echo "  \"success\": true,"
    echo "  \"data\": ["
    ps aux --no-headers | awk '"'"'{
        printf "    {"
        printf "\"user\": \"%s\", ", $1
        printf "\"pid\": \"%s\", ", $2
        printf "\"cpu\": \"%s\", ", $3
        printf "\"mem\": \"%s\", ", $4
        printf "\"vsz\": \"%s\", ", $5
        printf "\"rss\": \"%s\", ", $6
        printf "\"tty\": \"%s\", ", $7
        printf "\"stat\": \"%s\", ", $8
        printf "\"start\": \"%s\", ", $9
        printf "\"time\": \"%s\", ", $10
        printf "\"command\": \"%s\"", substr($0, index($0,$11))
        print "},"
    }'"'"' | sed '"'"'$s/,//'"'"'
    echo "  ]"
    echo "}"
'
/api/process/kill/$1 POST bash -c '
    echo "Content-type: application/json"
    echo
    if kill -9 $1 2>/dev/null; then
        echo "{"
        echo "  \"success\": true,"
        echo "  \"message\": \"進程已終止\""
        echo "}"
    else
        echo "{"
        echo "  \"success\": false,"
        echo "  \"error\": \"無法終止進程\""
        echo "}"
    fi
'
/api/process/top GET bash -c '
    echo "Content-type: application/json"
    echo
    echo "{"
    echo "  \"success\": true,"
    echo "  \"data\": {"
    echo "    \"cpu\": \"$(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk "{print 100 - \$1}")%\","
    echo "    \"memory\": {"
    echo "      \"total\": \"$(free -h | grep "Mem:" | awk "{print \$2}")\","
    echo "      \"used\": \"$(free -h | grep "Mem:" | awk "{print \$3}")\","
    echo "      \"free\": \"$(free -h | grep "Mem:" | awk "{print \$4}")\""
    echo "    },"
    echo "    \"processes\": ["
    top -bn1 | head -n 12 | tail -n 5 | awk '"'"'{
        printf "      {"
        printf "\"pid\": \"%s\", ", $1
        printf "\"user\": \"%s\", ", $2
        printf "\"pr\": \"%s\", ", $3
        printf "\"ni\": \"%s\", ", $4
        printf "\"virt\": \"%s\", ", $5
        printf "\"res\": \"%s\", ", $6
        printf "\"shr\": \"%s\", ", $7
        printf "\"s\": \"%s\", ", $8
        printf "\"cpu\": \"%s\", ", $9
        printf "\"mem\": \"%s\", ", $10
        printf "\"time\": \"%s\", ", $11
        printf "\"command\": \"%s\"", $12
        print "},"
    }'"'"' | sed '"'"'$s/,//'"'"'
    echo "    ]"
    echo "  }"
    echo "}"
'

# 用戶管理
/api/user/list GET bash -c '
    echo "Content-type: application/json"
    echo
    echo "{"
    echo "  \"success\": true,"
    echo "  \"data\": ["
    awk -F: '"'"'$7 != "/sbin/nologin" && $7 != "/bin/false" {
        printf "    {"
        printf "\"username\": \"%s\", ", $1
        printf "\"uid\": \"%s\", ", $3
        printf "\"home\": \"%s\", ", $6
        printf "\"shell\": \"%s\"", $7
        print "},"
    }'"'"' /etc/passwd | sed '"'"'$s/,//'"'"'
    echo "  ]"
    echo "}"
'
/api/user/add POST bash -c '
    echo "==== 開始創建用戶 $1 ===="
    if id "$1" >/dev/null 2>&1; then
        echo "錯誤：用戶已存在"
        exit 1
    fi
    useradd "$1" && echo "$1:$%1" | chpasswd
    echo "用戶 $1 創建成功"
'
/api/user/delete/$1 POST userdel -r $1
/api/user/password POST bash -c '
    echo "==== 修改用戶 $1 密碼 ===="
    if ! id "$1" >/dev/null 2>&1; then
        echo "錯誤：用戶不存在"
        exit 1
    fi
    echo "$1:$%1" | chpasswd
    echo "密碼修改成功"
'

# 網絡工具
/api/network/interfaces GET ip addr show
/api/network/connections GET netstat -tuln
/api/network/ping/$1 GET ping -c 4 $1
/api/network/dns/$1 GET nslookup $1
/api/network/trace/$1 GET traceroute $1

# 檔案系統
/api/fs/list GET bash -c '
    echo "{"
    echo "  \"disks\": ["
    lsblk -J
    echo "  ],"
    echo "  \"mounts\": ["
    df -h -x tmpfs -x devtmpfs | tail -n +2 | awk "{printf \"    {\\\"mount\\\": \\\"%s\\\", \\\"size\\\": \\\"%s\\\", \\\"used\\\": \\\"%s\\\", \\\"avail\\\": \\\"%s\\\", \\\"use_percent\\\": \\\"%s\\\"},\\n\", \$6, \$2, \$3, \$4, \$5}"
    echo "  ]"
    echo "}"
'
/api/fs/space GET df -h
/api/fs/inodes GET df -i

# 日誌查看
/api/logs/system GET journalctl -n 100 --no-pager
/api/logs/auth GET tail -n 100 /var/log/auth.log
/api/logs/custom/$1 GET tail -n 100 $1

# 防火牆管理
/api/firewall/status GET ufw status
/api/firewall/enable POST ufw enable
/api/firewall/disable POST ufw disable
/api/firewall/allow/$1 POST ufw allow $1
/api/firewall/deny/$1 POST ufw deny $1

# 系統更新
/api/system/updates GET apt list --upgradable 2>/dev/null
/api/system/update POST bash -c '
    echo "==== 開始系統更新 ===="
    echo "1. 更新套件清單..."
    apt update
    echo "2. 安裝更新..."
    apt upgrade -y
    echo "3. 清理不需要的套件..."
    apt autoremove -y
    echo "==== 更新完成 ===="
'

# 備份
/api/backup/create/$1 POST bash -c '
    BACKUP_DIR="/opt/panelbase/backups"
    mkdir -p "$BACKUP_DIR"
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    tar -czf "$BACKUP_DIR/$1_$TIMESTAMP.tar.gz" $%1
    echo "備份已創建：$1_$TIMESTAMP.tar.gz"
'
/api/backup/list GET ls -l /opt/panelbase/backups
/api/backup/delete/$1 POST rm -f "/opt/panelbase/backups/$1"

# 資料庫管理 (MySQL 示例)
/api/mysql/status GET systemctl status mysql
/api/mysql/databases GET mysql -N -e "SHOW DATABASES"
/api/mysql/create/$1 POST mysql -e "CREATE DATABASE $1"
/api/mysql/drop/$1 POST mysql -e "DROP DATABASE $1"

# Docker 管理
/api/docker/status GET docker info
/api/docker/containers GET docker ps -a
/api/docker/images GET docker images
/api/docker/start/$1 POST docker start $1
/api/docker/stop/$1 POST docker stop $1
/api/docker/restart/$1 POST docker restart $1

# 自定義命令
/api/custom/date GET date "+%Y-%m-%d %H:%M:%S"
/api/custom/random GET od -An -N2 -i /dev/urandom
/api/custom/shell POST bash -c "$%1"

# 面板相關 API
/api/panel/username GET bash -c '
    AUTH_TOKEN=$(echo "$HTTP_COOKIE" | grep -oP "auth_token=\K[^;]+")
    if [ -n "$AUTH_TOKEN" ]; then
        USERNAME=$(awk -F: -v token="$AUTH_TOKEN" "$1 == token {print $2}" "/opt/panelbase/src/config/sessions.conf")
        echo "Content-type: application/json"
        echo
        echo "\"$USERNAME\""
    else
        echo "Content-type: application/json"
        echo "Status: 401"
        echo
        echo "1"
    fi
'

/api/panel/system_info GET bash -c '
    # 獲取 CPU 使用率
    CPU_USAGE=$(top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk "{print 100 - \$1}")

    # 獲取記憶體使用情況
    MEM_TOTAL=$(free -m | awk "/Mem:/ {print \$2}")
    MEM_USED=$(free -m | awk "/Mem:/ {print \$3}")
    MEM_FREE=$(free -m | awk "/Mem:/ {print \$4}")
    MEM_INFO="總計: ${MEM_TOTAL}MB 已使用: ${MEM_USED}MB 可用: ${MEM_FREE}MB"

    # 獲取磁碟使用情況
    DISK_TOTAL=$(df -h / | tail -n1 | awk "{print \$2}")
    DISK_USED=$(df -h / | tail -n1 | awk "{print \$3}")
    DISK_FREE=$(df -h / | tail -n1 | awk "{print \$4}")
    DISK_USAGE=$(df -h / | tail -n1 | awk "{print \$5}")
    DISK_INFO="總計: ${DISK_TOTAL} 已使用: ${DISK_USED} 可用: ${DISK_FREE} 使用率: ${DISK_USAGE}"

    # 檢查 lighttpd 狀態
    if systemctl is-active lighttpd >/dev/null 2>&1; then
        LIGHTTPD_STATUS="運行中"
    else
        LIGHTTPD_STATUS="已停止"
    fi

    # 生成隨機數
    RANDOM_NUMBER=$(od -An -N2 -i /dev/urandom | tr -d " ")

    # 返回 JSON 格式的數據
    echo "Content-type: application/json"
    echo "Cache-Control: no-cache"
    echo
    echo "{"
    echo "    \"cpu\": \"${CPU_USAGE}\","
    echo "    \"memory\": \"${MEM_INFO}\","
    echo "    \"disk\": \"${DISK_INFO}\","
    echo "    \"lighttpd_status\": \"${LIGHTTPD_STATUS}\","
    echo "    \"random\": \"${RANDOM_NUMBER}\""
    echo "}"
'

# 主題管理
/api/panel/theme GET bash -c '
    AUTH_TOKEN=$(echo "$HTTP_COOKIE" | grep -oP "auth_token=\K[^;]+")
    if [ -n "$AUTH_TOKEN" ]; then
        USERNAME=$(awk -F: -v token="$AUTH_TOKEN" "$1 == token {print $2}" "/opt/panelbase/src/config/sessions.conf")
        if [ -n "$USERNAME" ]; then
            THEME=$(awk -F: -v user="$USERNAME" "$1 == user {print $2}" "/opt/panelbase/src/config/themes.conf")
            echo "Content-type: application/json"
            echo
            if [ -n "$THEME" ]; then
                echo "\"$THEME\""
            else
                echo "null"
            fi
        else
            echo "Content-type: application/json"
            echo "Status: 401"
            echo
            echo "null"
        fi
    else
        echo "Content-type: application/json"
        echo "Status: 401"
        echo
        echo "null"
    fi
'

/api/panel/theme POST bash -c '
    AUTH_TOKEN=$(echo "$HTTP_COOKIE" | grep -oP "auth_token=\K[^;]+")
    if [ -n "$AUTH_TOKEN" ]; then
        USERNAME=$(awk -F: -v token="$AUTH_TOKEN" "$1 == token {print $2}" "/opt/panelbase/src/config/sessions.conf")
        if [ -n "$USERNAME" ]; then
            read -n "$CONTENT_LENGTH" POST_DATA
            THEME=$(echo "$POST_DATA" | grep -oP "theme=\K[^&]+")
            if [ "$THEME" = "dark" ] || [ "$THEME" = "light" ]; then
                sed -i "/^$USERNAME:/d" "/opt/panelbase/src/config/themes.conf"
                echo "$USERNAME:$THEME" >> "/opt/panelbase/src/config/themes.conf"
                echo "Content-type: application/json"
                echo
                echo "0"
            else
                echo "Content-type: application/json"
                echo "Status: 400"
                echo
                echo "1"
            fi
        else
            echo "Content-type: application/json"
            echo "Status: 401"
            echo
            echo "1"
        fi
    else
        echo "Content-type: application/json"
        echo "Status: 401"
        echo
        echo "1"
    fi
'

