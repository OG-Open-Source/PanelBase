server.modules = (
	"mod_access",
	"mod_alias",
	"mod_compress",
	"mod_redirect",
	"mod_rewrite",
	"mod_cgi",
	"mod_accesslog"
)

server.document-root = "/opt/panelbase/www"
server.port = 7122

server.username = "www-data"
server.groupname = "www-data"

server.errorlog = "/opt/panelbase/logs/error.log"
accesslog.filename = "/opt/panelbase/logs/access.log"
accesslog.format = "%h %V %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\""

$HTTP["url"] =~ "^/" {
	dir-listing.activate = "disable"
}

cgi.assign = ( ".cgi" => "" )
alias.url = ( "/cgi-bin/" => "/opt/panelbase/cgi-bin/" )

$HTTP["url"] =~ "^/cgi-bin/" {
	cgi.assign = ( "" => "" )
}

mimetype.assign = (
	".html" => "text/html",
	".css"  => "text/css",
	".js"   => "application/javascript",
	".png"  => "image/png",
	".jpg"  => "image/jpeg",
	".jpeg" => "image/jpeg",
	".gif"  => "image/gif",
	".ico"  => "image/x-icon",
	".svg"  => "image/svg+xml",
	".woff" => "font/woff",
	".woff2" => "font/woff2",
	".ttf"  => "font/ttf",
	".eot"  => "application/vnd.ms-fontobject"
)

$HTTP["url"] !~ "^/$" {
	$HTTP["url"] !~ "^/cgi-bin/(auth|panel)\.cgi" {
		url.rewrite-once = (
			"^/.*" => "/cgi-bin/check_auth.cgi"
		)
	}
}

index-file.names = ( "index.html" )

static-file.exclude-extensions = ( ".cgi" )
