server.document-root = "/opt/panelbase/www"
server.port = 8080

server.modules = (
    "mod_access",
    "mod_cgi",
    "mod_rewrite"
)

# CGI 配置
cgi.assign = ( ".cgi" => "" )
static-file.exclude-extensions = ( ".cgi" )

# 日誌配置
server.errorlog = "/opt/panelbase/logs/error.log"
accesslog.filename = "/opt/panelbase/logs/access.log"

# URL 重寫規則
$HTTP["url"] !~ "^/$" {
    $HTTP["url"] !~ "^/cgi-bin/auth\.cgi" {
        url.rewrite-once = (
            "^/.*" => "/cgi-bin/check_auth.cgi"
        )
    }
}

# MIME 類型
mimetype.assign = (
    ".html" => "text/html",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".png"  => "image/png",
    ".jpg"  => "image/jpeg",
    ".gif"  => "image/gif",
    ".svg"  => "image/svg+xml"
) 