#!/bin/bash

# PanelBase 會話安全配置文件
# 最後更新：$(date "+%Y-%m-%d %H:%M:%S")

# === 會話配置 ===
# 會話文件路徑（安裝時會被替換為實際路徑）
SESSION_FILE="${INSTALL_DIR}/config/sessions.conf"

# 會話 Cookie 設定
SESSION_COOKIE_NAME="auth_token"
SESSION_COOKIE_PATH="/"
SESSION_COOKIE_SECURE=true
SESSION_COOKIE_HTTPONLY=true
SESSION_COOKIE_SAMESITE="Strict"

# === 會話安全參數 ===
# 會話有效期（秒）
SESSION_LIFETIME=3600  # 1小時

# 會話輪換間隔（秒）
SESSION_ROTATION_INTERVAL=1800  # 30分鐘

# 會話清理間隔（秒）
SESSION_CLEANUP_INTERVAL=300  # 5分鐘

# 每個用戶的最大會話數
MAX_SESSIONS_PER_USER=3

# 會話令牌長度
SESSION_TOKEN_LENGTH=32

# === 會話安全函數 ===
# 生成會話令牌
generate_session_token() {
	head -c 32 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c "$SESSION_TOKEN_LENGTH"
}

# 創建新會話
create_session() {
	local username="$1"
	local current_time=$(date +%s)

	# 檢查用戶現有會話數
	local session_count=$(grep ":$username:" "$SESSION_FILE" | wc -l)
	if [ "$session_count" -ge "$MAX_SESSIONS_PER_USER" ]; then
		# 刪除最舊的會話
		local oldest_session=$(grep ":$username:" "$SESSION_FILE" | sort -t: -k3 | head -n1)
		local oldest_token=$(echo "$oldest_session" | cut -d: -f1)
		sed -i "/^$oldest_token:/d" "$SESSION_FILE"
	fi

	# 生成新會話令牌
	local token=$(generate_session_token)

	# 記錄會話
	echo "$token:$username:$current_time" >> "$SESSION_FILE"

	# 設置會話 Cookie
	local expiry=$((current_time + SESSION_LIFETIME))
	echo "Set-Cookie: $SESSION_COOKIE_NAME=$token; Path=$SESSION_COOKIE_PATH; HttpOnly; SameSite=Strict; Max-Age=$SESSION_LIFETIME; Expires=$(date -u -d "@$expiry" "+%a, %d %b %Y %H:%M:%S GMT")"
}

# 驗證會話
validate_session() {
	local token="$1"
	local current_time=$(date +%s)

	# 檢查會話是否存在
	local session_line=$(grep "^$token:" "$SESSION_FILE")
	if [ -z "$session_line" ]; then
		return 1
	fi

	# 檢查會話是否過期
	local session_time=$(echo "$session_line" | cut -d: -f3)
	if [ $((current_time - session_time)) -gt "$SESSION_LIFETIME" ]; then
		delete_session "$token"
		return 1
	fi

	# 檢查是否需要輪換
	if [ $((current_time - session_time)) -gt "$SESSION_ROTATION_INTERVAL" ]; then
		rotate_session "$token"
	fi

	return 0
}

# 輪換會話
rotate_session() {
	local old_token="$1"
	local session_line=$(grep "^$old_token:" "$SESSION_FILE")
	local username=$(echo "$session_line" | cut -d: -f2)

	# 刪除舊會話
	delete_session "$old_token"

	# 創建新會話
	create_session "$username"
}

# 刪除會話
delete_session() {
	local token="$1"
	sed -i "/^$token:/d" "$SESSION_FILE"
}

# 清理過期會話
cleanup_sessions() {
	local current_time=$(date +%s)
	local temp_file=$(mktemp)

	# 保留未過期的會話
	awk -F: -v time="$current_time" -v max_age="$SESSION_LIFETIME" '
		(time - $3) < max_age {print $0}
	' "$SESSION_FILE" > "$temp_file"

	# 更新會話文件
	mv "$temp_file" "$SESSION_FILE"
	chmod 600 "$SESSION_FILE"
}

# 獲取用戶角色
get_user_role() {
	local username="$1"
	if [ "$username" = "admin" ]; then
		echo "admin"
	else
		echo "user"
	fi
}

# 檢查會話權限
check_session_permission() {
	local token="$1"
	local required_permission="$2"

	# 驗證會話
	if ! validate_session "$token"; then
		return 1
	fi

	# 獲取用戶資訊
	local username=$(grep "^$token:" "$SESSION_FILE" | cut -d: -f2)
	local role=$(get_user_role "$username")

	# 檢查權限
	if [ "$role" = "admin" ]; then
		return 0
	elif [ "$role" = "user" ] && [ "$required_permission" = "read" ]; then
		return 0
	else
		return 1
	fi
}