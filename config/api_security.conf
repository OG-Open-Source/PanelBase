#!/bin/bash

# PanelBase API 安全配置文件
# 最後更新：$(date "+%Y-%m-%d %H:%M:%S")

# === API 端點安全 ===
# API 端點權限設定
declare -A API_PERMISSIONS=(
	["/api/system/info"]="read"
	["/api/service/status"]="read"
	["/api/service/start"]="write"
	["/api/service/stop"]="write"
	["/api/service/restart"]="write"
	["/api/process/list"]="read"
	["/api/process/kill"]="write"
	["/api/user/list"]="read"
	["/api/user/add"]="write"
	["/api/user/delete"]="write"
	["/api/logs/system"]="read"
	["/api/logs/custom"]="read"
	["/api/custom/shell"]="write"
)

# API 訪問控制列表
declare -A API_ACL=(
	["admin"]="read,write"
	["user"]="read"
	["guest"]="read:limited"
)

# === API 請求驗證 ===
# API 請求必需的標頭
REQUIRED_HEADERS=(
	"Content-Type"
	"X-Requested-With"
)

# API 請求內容類型白名單
ALLOWED_CONTENT_TYPES=(
	"application/json"
	"application/x-www-form-urlencoded"
)

# === API 響應安全 ===
# 安全響應標頭
SECURITY_HEADERS=(
	"X-Content-Type-Options: nosniff"
	"X-Frame-Options: DENY"
	"X-XSS-Protection: 1; mode=block"
	"Content-Security-Policy: default-src 'self'"
	"Strict-Transport-Security: max-age=31536000; includeSubDomains"
)

# === API 安全函數 ===
# 檢查 API 權限
check_api_permission() {
	local user_role="$1"
	local api_path="$2"
	local required_permission="${API_PERMISSIONS[$api_path]}"
	local user_permissions="${API_ACL[$user_role]}"

	if [[ "$user_permissions" == *"$required_permission"* ]]; then
		return 0
	fi

	return 1
}

# 驗證 API 請求
validate_api_request() {
	local content_type="$1"

	# 檢查內容類型
	local is_valid_content_type=false
	for allowed_type in "${ALLOWED_CONTENT_TYPES[@]}"; do
		if [ "$content_type" = "$allowed_type" ]; then
			is_valid_content_type=true
			break
		fi
	done

	if [ "$is_valid_content_type" = false ]; then
		return 1
	fi

	return 0
}

# 設置安全響應標頭
set_security_headers() {
	for header in "${SECURITY_HEADERS[@]}"; do
		echo "$header"
	done
}

# 記錄 API 訪問
log_api_access() {
	local user="$1"
	local api_path="$2"
	local status="$3"
	local timestamp=$(date "+%Y-%m-%d %H:%M:%S")

	echo "[$timestamp] User: $user, API: $api_path, Status: $status" >> "$ACCESS_LOG"
}

# 檢查 API 速率限制
check_api_rate_limit() {
	local user="$1"
	local api_path="$2"
	local current_time=$(date +%s)
	local count=$(grep "$user.*$api_path" "$ACCESS_LOG" | wc -l)

	if [ "$count" -gt "$API_RATE_LIMIT" ]; then
		return 1
	fi

	return 0
}