# 啟用必要的模組
server.modules = (
    "mod_redirect",
    "mod_rewrite",
    "mod_setenv",
    "mod_openssl",
    "mod_cgi"
)

# SSL 配置
$SERVER["socket"] == ":443" {
    ssl.engine = "enable"
    ssl.pemfile = "/etc/lighttpd/certs/server.pem"
    ssl.cipher-list = "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH"
    ssl.honor-cipher-order = "enable"
}

# HTTP 到 HTTPS 的重定向
$SERVER["socket"] == ":80" {
    url.redirect = ( "^/panelbase/s/(.*)" => "https://%1/panelbase/s/$1" )
}

# /s/ 路徑的訪問控制
$HTTP["url"] =~ "^/panelbase/s/" {
    $HTTP["request-method"] !~ "^(GET|POST)$" {
        url.access-deny = ( "" )
    }
}

# 禁止直接訪問 .cgi 文件
$HTTP["url"] =~ "^/panelbase/cgi-bin/.*\.cgi$" {
    url.access-deny = ( "" )
}

# URL 重寫規則
url.rewrite-once = (
    "^/panelbase/s/login(\?.*)?$" => "/panelbase/cgi-bin/auth.cgi?action=login$1",
    "^/panelbase/s/logout$" => "/panelbase/cgi-bin/auth.cgi?action=logout",
    "^/panelbase/s/check$" => "/panelbase/cgi-bin/auth.cgi?action=check",
    "^/panelbase/s/validate$" => "/panelbase/cgi-bin/auth.cgi?action=validate"
)

# 安全標頭
setenv.add-response-header = (
    "X-Frame-Options" => "SAMEORIGIN",
    "X-Content-Type-Options" => "nosniff",
    "X-XSS-Protection" => "1; mode=block",
    "Referrer-Policy" => "strict-origin-when-cross-origin"
)