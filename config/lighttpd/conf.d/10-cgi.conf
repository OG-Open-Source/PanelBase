# CGI 腳本配置
$HTTP["url"] =~ "^/panelbase/cgi-bin/" {
    cgi.assign = ( ".cgi" => "" )
    dir-listing.activate = "disable"
}

# CGI 目錄別名
alias.url += ( "/panelbase/cgi-bin/" => "/var/www/panelbase/cgi-bin/" )

# CGI 環境變數設置
setenv.add-environment = (
    "TZ" => "UTC",
    "LANG" => "en_US.UTF-8"
)

# CGI 超時設置
cgi.timeout = 60

# 禁用目錄列表
dir-listing.activate = "disable"

# 設置 MIME 類型
mimetype.assign = (
    ".cgi" => "application/x-httpd-cgi",
    ".json" => "application/json"
)

# 安全設置
$HTTP["url"] =~ "^/panelbase/cgi-bin/" {
    url.access-deny = ( "~", ".inc", ".htaccess", ".htpasswd" )
    
    $HTTP["request-method"] !~ "^(GET|POST)$" {
        url.access-deny = ( "" )
    }
} 