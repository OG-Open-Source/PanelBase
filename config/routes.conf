# PanelBase Routes Configuration

# System Information
/api/panel/system_info:free -m | awk 'NR==2{printf "{\"cpu\":\"%.2f\"}", \$3*100/\$2}'
/api/panel/username:whoami

# System Update
/api/system/apt/update:sudo DEBIAN_FRONTEND=noninteractive apt-get update 2>&1
/api/system/apt/upgradable:apt list --upgradable 2>/dev/null | tail -n +2 | awk -F'/' '{printf "{\"package\":\"%s\",\"version\":\"%s\"},", $1, $2}' | sed 's/,$//' | awk '{print "[" $0 "]"}'

# System Status
/api/system/cpu:top -bn1 | grep "Cpu(s)" | awk '{printf "{\"usage\":\"%.1f\"}", 100-$8}'
/api/system/memory:free -m | awk 'NR==2{printf "{\"total\":%d,\"used\":%d,\"free\":%d,\"usage\":\"%.1f%%\"}", $2, $3, $4, $3*100/$2}'
/api/system/disk:df -h / | awk 'NR==2{printf "{\"total\":\"%s\",\"used\":\"%s\",\"free\":\"%s\",\"usage\":\"%s\"}", $2, $3, $4, $5}'
/api/system/uptime:uptime -p | sed 's/^up //' | awk '{printf "{\"uptime\":\"%s\"}", $0}'
/api/system/load:uptime | awk -F'load average:' '{split($2,a,", "); printf "{\"1m\":%s,\"5m\":%s,\"15m\":%s}", a[1], a[2], a[3]}'

# Network Management
/api/network/interfaces:ip -j addr
/api/network/connections:ss -tuln
/api/network/ip:curl -s https://api.ipify.org?format=json

# Service Management
/api/service/list:systemctl list-units --type=service --no-pager --no-legend | awk '{printf "{\"name\":\"%s\",\"status\":\"%s\"},", $1, $4}' | sed 's/,$//' | awk '{print "[" $0 "]"}'
/api/service/status:systemctl status
/api/service/start:systemctl start
/api/service/stop:systemctl stop
/api/service/restart:systemctl restart

# File Management
/api/files/list:ls -la --time-style="+%Y-%m-%d %H:%M:%S" | awk 'NR>1{printf "{\"perms\":\"%s\",\"owner\":\"%s\",\"group\":\"%s\",\"size\":%s,\"time\":\"%s %s\",\"name\":\"%s\"},", $1, $3, $4, $5, $6, $7, $8}' | sed 's/,$//' | awk '{print "[" $0 "]"}'
/api/files/create:touch
/api/files/delete:rm
/api/files/rename:mv
/api/files/chmod:chmod
/api/files/chown:chown