# PanelBase Routes Configuration

# System Information
/api/panel/system_info:free -m | awk 'NR==2{printf "%.2f", \$3*100/\$2}'
/api/panel/username:whoami

# System Update
/api/system/apt/update:sudo DEBIAN_FRONTEND=noninteractive apt-get update 2>&1
/api/system/apt/upgradable:apt list --upgradable 2>/dev/null | tail -n +2 | awk -F'/' '{printf "{\"package\":\"%s\",\"version\":\"%s\"},", $1, $2}' | sed 's/,$//' | awk '{print "[" $0 "]"}'

# Network Management
/api/network/interfaces:ip -j addr
/api/network/connections:ss -tuln

# Service Management
/api/service/status:systemctl status
/api/service/start:systemctl start
/api/service/stop:systemctl stop
/api/service/restart:systemctl restart

# File Management
/api/files/list:ls -la
/api/files/create:touch
/api/files/delete:rm
/api/files/rename:mv
/api/files/chmod:chmod
/api/files/chown:chown