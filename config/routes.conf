#!/bin/bash

# 系統資訊路由
route_system_GET_info() {
    local cache_key="system_info"
    local data cpu_usage mem_info disk_info lighttpd_status random_number
    
    data=$(get_cache "$cache_key") && echo "$data" && return 0
    
    # 獲取 CPU 使用率
    cpu_usage=$(top -bn1 | grep "Cpu(s)" | sed 's/.*, *\([0-9.]*\)%* id.*/\1/' | awk '{print 100 - $1}')
    
    # 獲取記憶體資訊
    mem_info=$(free -m | awk '/Mem:/ {printf "總計: %dMB 已使用: %dMB 可用: %dMB", $2, $3, $4}')
    
    # 獲取磁碟資訊
    disk_info=$(df -h / | tail -n1 | awk '{printf "總計: %s 已使用: %s 可用: %s 使用率: %s", $2, $3, $4, $5}')
    
    # 獲取 lighttpd 狀態
    lighttpd_status=$(systemctl is-active lighttpd >/dev/null 2>&1 && echo "運行中" || echo "已停止")
    
    # 生成隨機數
    random_number=$(od -An -N2 -i /dev/urandom | tr -d ' ')
    
    # 構建 JSON 響應
    data=$(cat << EOF
{
    "cpu": "${cpu_usage}",
    "memory": "${mem_info}",
    "disk": "${disk_info}",
    "lighttpd_status": "${lighttpd_status}",
    "random": "${random_number}"
}
EOF
)
    
    # 設置緩存
    set_cache "$cache_key" "$data"
    
    # 輸出結果
    echo "Content-type: application/json"
    echo "Cache-Control: no-cache"
    echo
    echo "$data"
}

# 服務控制路由
route_service_POST_control() {
    # 驗證參數
    eval $(parse_query_string "$POST_DATA")
    
    if ! validate_param "service" "${params[service]}" "enum" "true" "lighttpd"; then
        send_error 400 "無效的服務"
        return 1
    fi
    
    if ! validate_param "action" "${params[action]}" "enum" "true" "start|stop|restart"; then
        send_error 400 "無效的操作"
        return 1
    fi
    
    # 執行服務操作
    if systemctl "${params[action]}" "${params[service]}"; then
        # 清除系統資訊緩存
        clear_cache "system_info"
        send_success '{"status": "success"}'
    else
        send_error 500 "服務操作失敗"
    fi
} 