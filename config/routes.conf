# PanelBase Routes Configuration

# System Update
/api/panel/system_update@maxlog=20,maxreq=10,window=3600:sudo apt update; sudo apt install -y pppoeconf; sudo apt install -y git; ping google.com -c 4; sudo apt upgrade -y; sudo apt autoremove -y; sudo apt autoclean -y; source /opt/panelbase/utilkit.sh && SYS_INFO

# System Information
/api/panel/system_info@nolog,maxreq=10:cpu=$(top -bn1 | grep "Cpu(s)" | awk '{print 100-$8}') && mem=$(free -m | awk 'NR==2{printf "%.1f", $3*100/$2}') && disk=$(df -h / | awk 'NR==2{print $5}') && echo "{\"cpu\":\"$cpu\",\"memory\":\"$mem%\",\"disk\":\"$disk\"}"
/api/panel/username:whoami

# Get URL Content
/api/panel/get@maxreq=30,window=60:url=$(echo "$QUERY_STRING" | sed -n 's/^url=//p' | sed 's/%3A/:/g;s/%2F/\//g') && [ -n "$url" ] && curl -sSL "$url" || echo "No URL provided"

# System Status
/api/system/cpu@nolog,maxreq=60:sudo top -bn1 | grep "Cpu(s)" | awk '{printf "{\\\"usage\\\":\\\"%.1f\\\"}", 100-$8}'
/api/system/memory@nolog,maxreq=60:sudo free -m | awk 'NR==2{printf "{\\\"total\\\":%d,\\\"used\\\":%d,\\\"free\\\":%d,\\\"usage\\\":\\\"%.1f%%\\\"}", $2, $3, $4, $3*100/$2}'
/api/system/disk@nolog,maxreq=60:sudo df -h / | awk 'NR==2{printf "{\\\"total\\\":\\\"%s\\\",\\\"used\\\":\\\"%s\\\",\\\"free\\\":\\\"%s\\\",\\\"usage\\\":\\\"%s\\\"}", $2, $3, $4, $5}'
/api/system/uptime@nolog,maxreq=60:sudo uptime -p | sed 's/^up //' | awk '{printf "{\\\"uptime\\\":\\\"%s\\\"}", $0}'
/api/system/load@nolog,maxreq=60:sudo uptime | awk -F'load average:' '{split($2,a,", ");  printf "{\\\"1m\\\":%s,\\\"5m\\\":%s,\\\"15m\\\":%s}", a[1], a[2], a[3]}'

# Network Information
/api/network/ip@nolog,maxreq=60:curl -s https://api.ipify.org?format=json

# Service Management
/api/service/list@maxreq=30:sudo systemctl list-units --type=service --no-pager --no-legend | awk '{printf "{\\\"name\\\":\\\"%s\\\",\\\"status\\\":\\\"%s\\\"},", $1, $4}' | sed 's/,$//' | awk '{print "[" $0 "]"}'
/api/service/status@maxreq=30:sudo systemctl status
/api/service/start@maxreq=10:sudo systemctl start
/api/service/stop@maxreq=10:sudo systemctl stop
/api/service/restart@maxreq=10:sudo systemctl restart

# File Management
/api/files/list@maxreq=30:sudo ls -la --time-style="+%Y-%m-%d %H:%M:%S" | awk 'NR>1{printf "{\\\"perms\\\":\\\"%s\\\",\\\"owner\\\":\\\"%s\\\",\\\"group\\\":\\\"%s\\\",\\\"size\\\":%s,\\\"time\\\":\\\"%s %s\\\",\\\"name\\\":\\\"%s\\\"},", $1, $3, $4, $5, $6, $7, $8}' | sed 's/,$//' | awk '{print "[" $0 "]"}'
/api/files/create@maxreq=30:sudo touch
/api/files/delete@maxreq=10:sudo rm
/api/files/rename@maxreq=30:sudo mv
/api/files/chmod@maxreq=30:sudo chmod
/api/files/chown@maxreq=30:sudo chown