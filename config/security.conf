#!/bin/bash

# PanelBase 安全配置文件
# 最後更新：$(date "+%Y-%m-%d %H:%M:%S")

# === 檔案系統安全 ===
# 允許訪問的基礎目錄（安裝時會被替換為實際路徑）
ALLOWED_BASE_DIRS=(
	"${INSTALL_DIR}/logs"
	"${INSTALL_DIR}/www"
	"${INSTALL_DIR}/config"
)

# 允許的檔案類型（副檔名）
ALLOWED_FILE_EXTENSIONS=(
	".log"
	".txt"
	".html"
	".conf"
	".cgi"
	".js"
	".css"
)

# 檔案大小限制（位元組）
MAX_FILE_SIZE=10485760  # 10MB
MAX_LOG_SIZE=5242880    # 5MB

# === 操作安全 ===
# 操作超時設定（秒）
OPERATION_TIMEOUT=30
SCRIPT_TIMEOUT=60

# 檔案權限設定
DEFAULT_FILE_PERMISSION=644
DEFAULT_DIR_PERMISSION=755
SECURE_FILE_PERMISSION=600
SECURE_DIR_PERMISSION=700

# === 路徑安全 ===
# 是否允許符號連結
ALLOW_SYMLINKS=false

# 路徑深度限制
MAX_PATH_DEPTH=5

# === 命令執行安全 ===
# 允許執行的命令白名單
ALLOWED_COMMANDS=(
	"ls"
	"cat"
	"grep"
	"awk"
	"sed"
	"tail"
	"head"
	"ps"
	"top"
	"df"
	"du"
	"free"
	"systemctl"
	"journalctl"
)

# === 日誌設定 ===
# 日誌記錄級別：DEBUG, INFO, WARN, ERROR
LOG_LEVEL="INFO"

# 日誌文件路徑（安裝時會被替換為實際路徑）
SECURITY_LOG="${INSTALL_DIR}/logs/security.log"
ACCESS_LOG="${INSTALL_DIR}/logs/access.log"
ERROR_LOG="${INSTALL_DIR}/logs/error.log"

# === 會話安全 ===
# 會話超時時間（秒）
SESSION_TIMEOUT=3600

# 會話輪換時間（秒）
SESSION_ROTATION_INTERVAL=1800

# 最大同時會話數
MAX_SESSIONS_PER_USER=3

# === 請求限制 ===
# API 請求限制（每分鐘）
API_RATE_LIMIT=60

# 最大請求大小（位元組）
MAX_REQUEST_SIZE=1048576  # 1MB

# === 安全函數 ===
# 檢查檔案路徑安全
check_path_safety() {
	local path="$1"
	local base_dir="$2"

	# 規範化路徑
	local normalized_path=$(realpath -m "$path")

	# 檢查路徑深度
	local depth=$(echo "$normalized_path" | tr -cd '/' | wc -c)
	if [ "$depth" -gt "$MAX_PATH_DEPTH" ]; then
		return 1
	fi

	# 檢查是否在允許的目錄內
	local is_allowed=false
	for allowed_dir in "${ALLOWED_BASE_DIRS[@]}"; do
		if [[ "$normalized_path" == "$allowed_dir"* ]]; then
			is_allowed=true
			break
		fi
	done

	if [ "$is_allowed" = false ]; then
		return 1
	fi

	# 檢查副檔名
	local ext="${path##*.}"
	local is_allowed_ext=false
	for allowed_ext in "${ALLOWED_FILE_EXTENSIONS[@]}"; do
		if [[ ".$ext" == "$allowed_ext" ]]; then
			is_allowed_ext=true
			break
		fi
	done

	if [ "$is_allowed_ext" = false ]; then
		return 1
	fi

	return 0
}

# 檢查命令安全
check_command_safety() {
	local cmd="$1"
	local base_cmd=$(echo "$cmd" | awk '{print $1}')

	for allowed_cmd in "${ALLOWED_COMMANDS[@]}"; do
		if [ "$base_cmd" = "$allowed_cmd" ]; then
			return 0
		fi
	done

	return 1
}

# 記錄安全事件
log_security_event() {
	local level="$1"
	local message="$2"
	local timestamp=$(date "+%Y-%m-%d %H:%M:%S")

	echo "[$timestamp] [$level] $message" >> "$SECURITY_LOG"
}

# 檢查請求限制
check_rate_limit() {
	local ip="$1"
	local current_time=$(date +%s)
	local count=$(grep "$ip" "$ACCESS_LOG" | wc -l)

	if [ "$count" -gt "$API_RATE_LIMIT" ]; then
		return 1
	fi

	return 0
}