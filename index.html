<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PanelBase Control Panel</title>
	<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
	<link href="frontend/css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.5.95/css/materialdesignicons.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 font-inter">
	<div id="app" class="min-h-screen">
		<!-- Login Form -->
		<div v-if="!isAuthenticated" class="flex items-center justify-center min-h-screen p-4">
			<div
				class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 dark:border-gray-700">
				<div class="flex items-center justify-between mb-8">
					<h1
						class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-indigo-600 dark:from-blue-400 dark:to-indigo-500">
						PanelBase</h1>
					<button @click="toggleTheme"
						class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
						<span class="mdi text-2xl"
							:class="isDark ? 'mdi-weather-sunny text-yellow-400' : 'mdi-weather-night text-gray-600'"></span>
					</button>
				</div>

				<form @submit.prevent="login" class="space-y-6">
					<!-- Connection Settings -->
					<div class="space-y-6">
						<div class="flex items-center">
							<span class="mdi mdi-server-network text-blue-500 text-xl mr-2"></span>
							<h2 class="text-lg font-semibold text-gray-900 dark:text-white">Connection</h2>
						</div>
						<div class="grid grid-cols-2 gap-4">
							<div class="col-span-1">
								<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Host
									IP</label>
								<div class="relative">
									<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
										<span class="mdi mdi-ip-network"></span>
									</span>
									<input v-model="connection.host" type="text" placeholder="192.168.1.1"
										class="pl-10 block w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
								</div>
							</div>
							<div class="col-span-1">
								<label
									class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Port</label>
								<div class="relative">
									<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
										<span class="mdi mdi-pound"></span>
									</span>
									<input v-model.number="connection.port" type="number" placeholder="80"
										class="pl-10 block w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
								</div>
							</div>
						</div>
						<div>
							<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Security
								Code</label>
							<div class="relative">
								<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
									<span class="mdi mdi-shield-key"></span>
								</span>
								<input v-model="connection.securityCode" type="password" placeholder="8-digit code"
									class="pl-10 block w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent"
									maxlength="8">
							</div>
						</div>
					</div>

					<!-- System Keys -->
					<div class="space-y-6 pt-6 border-t border-gray-200 dark:border-gray-700">
						<div class="flex items-center">
							<span class="mdi mdi-key-chain text-blue-500 text-xl mr-2"></span>
							<h2 class="text-lg font-semibold text-gray-900 dark:text-white">System Keys</h2>
						</div>
						<div class="space-y-4">
							<div>
								<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">System
									ID</label>
								<div class="relative">
									<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
										<span class="mdi mdi-identifier"></span>
									</span>
									<input v-model="keys.key1" type="password"
										class="pl-10 block w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
								</div>
							</div>
							<div>
								<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Machine
									ID</label>
								<div class="relative">
									<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
										<span class="mdi mdi-desktop-tower"></span>
									</span>
									<input v-model="keys.key2" type="password"
										class="pl-10 block w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
								</div>
							</div>
							<div>
								<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">System
									UUID</label>
								<div class="relative">
									<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
										<span class="mdi mdi-uuid"></span>
									</span>
									<input v-model="keys.key3" type="password"
										class="pl-10 block w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
								</div>
							</div>
						</div>
					</div>

					<button type="submit"
						class="w-full flex justify-center items-center py-3 px-4 rounded-lg text-white text-sm font-semibold bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-lg transform transition-all duration-150 hover:scale-[1.02]">
						<span class="mdi mdi-login mr-2"></span>
						Connect to Panel
					</button>
				</form>
			</div>
		</div>

		<!-- Main Panel -->
		<div v-else class="min-h-screen">
			<!-- Header -->
			<nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
				<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
					<div class="flex justify-between h-16">
						<div class="flex items-center">
							<span class="mdi mdi-server text-blue-500 text-2xl mr-2"></span>
							<h1 class="text-xl font-bold text-gray-900 dark:text-white">PanelBase</h1>
							<span
								class="ml-2 px-2 py-1 text-xs font-medium bg-blue-100 text-blue-800 rounded-full dark:bg-blue-900 dark:text-blue-200">
								{{connection.host}}:{{connection.port}}
							</span>
						</div>
						<div class="flex items-center space-x-4">
							<button @click="toggleTheme"
								class="p-2 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
								<span class="mdi text-xl"
									:class="isDark ? 'mdi-weather-sunny' : 'mdi-weather-night'"></span>
							</button>
							<button @click="logout"
								class="flex items-center px-4 py-2 text-sm font-medium text-red-600 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300">
								<span class="mdi mdi-logout mr-1"></span>
								Logout
							</button>
						</div>
					</div>
				</div>
			</nav>

			<!-- Main Content -->
			<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
				<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
					<!-- Command Section -->
					<div class="lg:col-span-2">
						<div
							class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
							<div class="p-6">
								<div class="flex items-center mb-4">
									<span class="mdi mdi-console text-blue-500 text-xl mr-2"></span>
									<h2 class="text-lg font-semibold text-gray-900 dark:text-white">Command Console</h2>
								</div>
								<div class="space-y-4">
									<div class="flex space-x-2">
										<div class="relative flex-1">
											<span
												class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
												<span class="mdi mdi-chevron-right"></span>
											</span>
											<input v-model="command" type="text" placeholder="Enter command..."
												class="pl-10 block w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
										</div>
										<button @click="executeCommand"
											class="px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white font-medium shadow-sm transition-colors">
											Execute
										</button>
									</div>
									<div v-if="commandOutput" class="mt-4">
										<div class="flex items-center justify-between mb-2">
											<h3 class="text-sm font-medium text-gray-700 dark:text-gray-300">Output</h3>
											<span class="text-xs text-gray-500">Command result</span>
										</div>
										<pre
											class="bg-gray-50 dark:bg-gray-900 p-4 rounded-lg overflow-x-auto font-mono text-sm text-gray-800 dark:text-gray-200">{{ commandOutput }}</pre>
									</div>
								</div>
							</div>
						</div>
					</div>

					<!-- Share Access Section -->
					<div class="lg:col-span-1">
						<div
							class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
							<div class="p-6">
								<div class="flex items-center mb-4">
									<span class="mdi mdi-share-variant text-blue-500 text-xl mr-2"></span>
									<h2 class="text-lg font-semibold text-gray-900 dark:text-white">Share Access</h2>
								</div>
								<div class="space-y-4">
									<div>
										<label
											class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Max
											Users</label>
										<input v-model.number="shareConfig.maxUsers" type="number" min="1"
											class="block w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
									</div>
									<div>
										<label
											class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Expiry
											(hours)</label>
										<input v-model.number="shareConfig.expiryHours" type="number" min="1"
											class="block w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
									</div>
									<div>
										<label
											class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Permissions</label>
										<div class="space-y-2">
											<label class="flex items-center">
												<input v-model="shareConfig.permissions" type="checkbox" value="system"
													class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
												<span class="ml-2 text-sm text-gray-700 dark:text-gray-300">System
													Commands</span>
											</label>
											<label class="flex items-center">
												<input v-model="shareConfig.permissions" type="checkbox" value="network"
													class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
												<span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Network
													Commands</span>
											</label>
										</div>
									</div>
									<button @click="createShareToken"
										class="w-full flex justify-center items-center py-2 px-4 rounded-lg bg-green-500 hover:bg-green-600 text-white font-medium shadow-sm transition-colors">
										<span class="mdi mdi-key-plus mr-1"></span>
										Generate Token
									</button>
									<div v-if="shareToken" class="mt-4">
										<label
											class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Share
											Token</label>
										<div class="flex space-x-2">
											<input readonly :value="shareToken"
												class="block flex-1 rounded-lg border-gray-300 bg-gray-50 dark:bg-gray-900 dark:border-gray-600 dark:text-gray-300 font-mono text-sm">
											<button @click="copyShareToken"
												class="px-3 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300">
												<span class="mdi mdi-content-copy"></span>
											</button>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/vue@3.2.31/dist/vue.global.prod.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
	<script src="frontend/js/app.js"></script>
</body>

</html>
