<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PanelBase</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <style>
      :root {
        --primary-color: #007aff;
        --primary-gradient: linear-gradient(135deg, #0a84ff, #0066cc);
        --error-color: #ff3b30;
        --background-color: #f2f2f7;
        --input-background: #ffffff;
        --text-color: #1c1c1e;
        --secondary-text: #8e8e93;
        --border-radius: 12px;
        --border-radius-lg: 16px;
        --border-radius-sm: 8px;
        --input-height: 44px;
        --container-bg: rgba(255, 255, 255, 0.95);
        --container-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        --input-border: rgba(0, 0, 0, 0.1);
        --body-gradient: linear-gradient(135deg, #f6f8fb, #e9eef3);
        --primary-rgb: 0, 122, 255;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
      }

      body {
        background: var(--body-gradient);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }

      body::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
            45deg,
            transparent 45%,
            rgba(var(--primary-rgb), 0.03) 50%,
            transparent 55%
          ),
          linear-gradient(
            -45deg,
            transparent 45%,
            rgba(var(--primary-rgb), 0.03) 50%,
            transparent 55%
          );
        background-size: 30px 30px;
        animation: backgroundMove 20s linear infinite;
        z-index: -1;
      }

      .container {
        width: 100%;
        max-width: 380px;
        padding: 32px;
        background: var(--container-bg);
        border-radius: var(--border-radius-lg);
        box-shadow: var(--container-shadow);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        position: relative;
        z-index: 1;
        transition: box-shadow 0.3s ease;
        margin: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 32px;
        position: relative;
      }

      h1 {
        font-size: 32px;
        font-weight: 700;
        background: var(--primary-gradient);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      .input-container {
        position: relative;
        margin-bottom: 16px;
        background: none;
      }

      input {
        width: 100%;
        height: var(--input-height);
        padding: 0 16px 0 40px;
        border: 1.5px solid var(--input-border);
        border-radius: var(--border-radius);
        font-size: 16px;
        background: var(--input-background);
        transition: all 0.3s ease;
        color: var(--text-color);
        box-shadow: none;
      }

      input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.15);
      }

      .input-container i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--secondary-text);
        transition: color 0.3s ease;
      }

      .input-container input:focus + i {
        color: var(--primary-color);
      }

      button[type="submit"] {
        width: 100%;
        height: var(--input-height);
        background: var(--primary-gradient);
        color: white;
        border: none;
        border-radius: var(--border-radius);
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      button[type="submit"]::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 200%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent 0%,
          transparent 25%,
          rgba(255, 255, 255, 0.3) 45%,
          rgba(255, 255, 255, 0.7) 50%,
          rgba(255, 255, 255, 0.3) 55%,
          transparent 75%,
          transparent 100%
        );
        transform: skewX(-25deg);
        animation: shine 8s infinite;
      }

      @keyframes shine {
        0% {
          left: -200%;
        }
        20%,
        100% {
          left: 200%;
        }
      }

      button[type="submit"]:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
      }

      button[type="submit"]:active {
        transform: translateY(0);
      }

      button[type="submit"]:disabled {
        background: var(--secondary-text);
        transform: none;
        cursor: not-allowed;
      }

      button[type="submit"]:disabled::before {
        display: none;
      }

      .language-switcher {
        margin-top: 24px;
        text-align: center;
        display: flex;
        justify-content: center;
        gap: 8px;
      }

      .language-switcher button {
        background: none;
        border: 2px solid transparent;
        padding: 6px 12px;
        color: var(--secondary-text);
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
        border-radius: var(--border-radius-sm);
      }

      .language-switcher button:hover {
        background: rgba(0, 122, 255, 0.1);
        color: var(--primary-color);
      }

      .language-switcher button[data-active="true"] {
        border-color: var(--primary-color);
        color: var(--primary-color);
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes backgroundMove {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 100% 100%;
        }
      }

      #errorMessage {
        color: var(--error-color);
        font-size: 14px;
        margin-top: 12px;
        margin-bottom: 16px;
        text-align: center;
        opacity: 0;
        transform: translateY(-10px);
        transition: all 0.3s ease;
        border-radius: var(--border-radius-sm);
        background: rgba(255, 59, 48, 0.1);
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        animation: none;
      }

      #errorMessage:not([hidden]) {
        opacity: 1;
        transform: translateY(0);
        animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }

      @keyframes shake {
        10%,
        90% {
          transform: translateX(-1px);
        }
        20%,
        80% {
          transform: translateX(2px);
        }
        30%,
        50%,
        70% {
          transform: translateX(-4px);
        }
        40%,
        60% {
          transform: translateX(4px);
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 0;
          background: var(--container-bg);
        }
        .container {
          max-width: 100%;
          margin: 0;
          padding: 20px;
          min-height: 100vh;
          border-radius: 0;
          box-shadow: none;
        }
        .footer {
          position: relative;
          margin-top: 20px;
          transform: none;
          left: 0;
          bottom: 0;
        }
        body::before,
        body::after {
          display: none;
        }
        .theme-switcher {
          top: 10px;
          right: 10px;
        }
      }

      .footer {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: var(--secondary-text);
        font-size: 12px;
        opacity: 0.9;
        transition: all 0.3s ease;
        white-space: nowrap;
        background: var(--container-bg);
        padding: 8px 16px;
        border-radius: var(--border-radius);
        box-shadow: var(--container-shadow);
        backdrop-filter: blur(8px);
        z-index: 2;
      }

      .footer a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      .saved-settings-container {
        position: absolute;
        left: calc(100% + 20px);
        top: 0;
        width: 200px;
        padding: 16px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: var(--border-radius);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--input-border);
        display: none;
      }

      .saved-settings-container.visible {
        display: block;
      }

      .saved-settings-container p {
        margin: 0 0 8px;
        font-size: 14px;
        color: var(--secondary-text);
      }

      .saved-settings-container p:last-child {
        margin-bottom: 0;
      }

      .saved-settings-container strong {
        color: var(--text-color);
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>PanelBase</h1>
        <p i18n="login-prompt">Please login to continue</p>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="address" i18n="address">IP Address</label>
          <div class="input-container">
            <i class="fas fa-server"></i>
            <input
              type="text"
              id="address"
              name="address"
              placeholder="Your Server IP"
            />
          </div>
        </div>
        <div class="form-group">
          <label for="port" i18n="port">Port</label>
          <div class="input-container">
            <i class="fas fa-bolt"></i>
            <input
              type="port"
              id="port"
              name="port"
              placeholder="Your PanelBase Port"
            />
          </div>
        </div>
        <div class="form-group">
          <label for="entrance" i18n="entrance">Security Gateway</label>
          <div class="input-container">
            <i class="fas fa-shield-alt"></i>
            <input
              type="entrance"
              id="entrance"
              name="entrance"
              placeholder="Your Security Gateway"
            />
          </div>
          <div id="errorMessage" hidden></div>
        </div>
        <button type="submit" onclick="saveSettings()">
          <span i18n="login_button">Save Settings</span>
        </button>
      </form>
      <div class="language-switcher">
        <button onclick="changeLanguage('en')" data-lang="en">EN</button>
        <button onclick="changeLanguage('zh-TW')" data-lang="zh-TW">繁</button>
        <button onclick="changeLanguage('zh-CN')" data-lang="zh-CN">简</button>
      </div>
      <div class="saved-settings-container" id="savedSettings">
        <p><strong>Server IP:</strong> <span id="savedAddress">-</span></p>
        <p><strong>PanelBase Port:</strong> <span id="savedPort">-</span></p>
        <p>
          <strong>Security Gateway:</strong> <span id="savedEntrance">-</span>
        </p>
      </div>
    </div>

    <div class="footer">
      Powered by
      <a href="https://github.com/OG-Open-Source" target="_blank"
        >OG Open Source</a
      >
    </div>

    <script>
      const i18n = {
        en: {
          "login-prompt": "Please login to continue",
          address: "IP Address",
          address_placeholder: "Your Server IP",
          port: "Port",
          port_placeholder: "Your PanelBase Port",
          entrance: "Security Gateway",
          entrance_placeholder: "Your Security Gateway",
          login_button: "Login",
          logging_in: "Logging in...",
          error_invalid: "Invalid username or password",
          error_server: "Server error, please try again later",
          error_invalid_chars: "Invalid characters detected",
        },
        "zh-TW": {
          "login-prompt": "請登入以繼續",
          address: "IP 位址",
          address_placeholder: "您的伺服器 IP",
          port: "連接埠",
          port_placeholder: "您的 PanelBase 連接埠",
          entrance: "安全入口",
          entrance_placeholder: "您的安全入口",
          login_button: "登入",
          logging_in: "登入中...",
          error_invalid: "用戶名或密碼錯誤",
          error_server: "發生錯誤，請稍後再試",
          error_invalid_chars: "包含無效字符",
        },
        "zh-CN": {
          "login-prompt": "请登录以继续",
          address: "IP 地址",
          address_placeholder: "您的服务器 IP",
          port: "端口",
          port_placeholder: "您的 PanelBase 端口",
          entrance: "安全入口",
          entrance_placeholder: "您的安全入口",
          login_button: "登录",
          logging_in: "登录中...",
          error_invalid: "用户名或密码错误",
          error_server: "发生错误，请稍后再试",
          error_invalid_chars: "包含无效字符",
        },
      };

      function getBrowserLanguage() {
        const lang = navigator.language || navigator.userLanguage;
        if (lang.startsWith("zh")) {
          return lang === "zh-TW" ? "zh-TW" : "zh-CN";
        }
        return "en";
      }

      let currentLanguage =
        localStorage.getItem("panelbase-language") || getBrowserLanguage();

      function updateTexts() {
        document.querySelectorAll("[i18n]").forEach((element) => {
          const key = element.getAttribute("i18n");
          element.textContent = i18n[currentLanguage][key];
        });

        document.getElementById("address").placeholder =
          i18n[currentLanguage]["address_placeholder"];
        document.getElementById("port").placeholder =
          i18n[currentLanguage]["port_placeholder"];
        document.getElementById("entrance").placeholder =
          i18n[currentLanguage]["entrance_placeholder"];
        document.documentElement.lang = currentLanguage;

        document.querySelectorAll("[data-lang]").forEach((button) => {
          button.setAttribute(
            "data-active",
            button.getAttribute("data-lang") === currentLanguage
          );
        });
      }

      function changeLanguage(lang) {
        currentLanguage = lang;
        localStorage.setItem("panelbase-language", lang);
        updateTexts();

        const errorMessage = document.getElementById("errorMessage");
        if (!errorMessage.hidden) {
          const currentErrorKey = errorMessage.getAttribute("data-error-key");
          if (currentErrorKey) {
            showErrorMessage(currentErrorKey);
          }
        }
      }

      updateTexts();

      function showErrorMessage(errorKey) {
        const errorMessage = document.getElementById("errorMessage");
        errorMessage.innerHTML = `<i class="fas fa-exclamation-circle"></i>${i18n[currentLanguage][errorKey]}`;
        errorMessage.setAttribute("data-error-key", errorKey);
        errorMessage.hidden = false;

        errorMessage.style.animation = "none";
        void errorMessage.offsetHeight;
        errorMessage.style.animation =
          "shake 0.5s cubic-bezier(.36, .07, .19, .97) both";
      }

      async function handleLogin(event) {
        event.preventDefault();
        const submitButton = event.target.querySelector(
          'button[type="submit"]'
        );
        const address = document.getElementById("address").value;
        const port = document.getElementById("port").value;
        const entrance = document.getElementById("entrance").value;

        if (!/^[A-Za-z0-9]+$/.test(address)) {
          showErrorMessage("error_invalid_chars");
          return;
        }

        if (!/^[A-Za-z0-9!@$]+$/.test(port)) {
          showErrorMessage("error_invalid_chars");
          return;
        }

        try {
          submitButton.disabled = true;
          submitButton.querySelector('[i18n="login_button"]').textContent =
            i18n[currentLanguage]["logging_in"];

          // 構建 PanelBase 對接 URL
          const panelBaseUrl = `http://${address}:${port}/${entrance}/command`;

          // 發送測試請求驗證連接
          const response = await fetch(panelBaseUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ command: "status" }),
          });

          if (!response.ok) {
            throw new Error("Connection failed");
          }

          // 保存設置並跳轉
          saveSettings();
          window.location.href = panelBaseUrl.replace("/command", "/dashboard");
        } catch (error) {
          console.error("Error:", error);
          showErrorMessage("error_server");
        } finally {
          submitButton.disabled = false;
          submitButton.querySelector('[i18n="login_button"]').textContent =
            i18n[currentLanguage]["login_button"];
        }
      }

      function saveSettings() {
        const address = document.getElementById("address").value;
        const port = document.getElementById("port").value;
        const entrance = document.getElementById("entrance").value;

        if (address && port && entrance) {
          const cryptoKey = window.crypto
            .getRandomValues(new Uint32Array(4))
            .join("-");
          const settings = {
            address,
            port,
            entrance,
            lastUpdated: new Date().toISOString(),
            _enc: btoa(
              unescape(
                encodeURIComponent(
                  JSON.stringify({
                    address,
                    port,
                    entrance,
                    lastUpdated: new Date().toISOString(),
                  })
                )
              )
            ),
          };
          localStorage.setItem("panelbase_settings", JSON.stringify(settings));
          displayStoredSettings();
        }
      }

      function validateSettings(settings) {
        return (
          settings &&
          typeof settings.address === "string" &&
          typeof settings.port === "string" &&
          typeof settings.entrance === "string" &&
          settings.address.length > 0 &&
          settings.port.length > 0 &&
          settings.entrance.length > 0
        );
      }

      function displayStoredSettings() {
        const settings = getLocalSettings();
        if (!validateSettings(settings)) {
          localStorage.removeItem("panelbase_settings");
          return;
        }
        const savedSettingsContainer = document.getElementById("savedSettings");

        if (settings) {
          document.getElementById("savedAddress").textContent =
            settings.address;
          document.getElementById("savedPort").textContent = settings.port;
          document.getElementById("savedEntrance").textContent =
            settings.entrance;
          savedSettingsContainer.classList.add("visible");

          // 清除舊版cookie
          document.cookie =
            "settings=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        } else {
          savedSettingsContainer.classList.remove("visible");
        }
      }

      function getLocalSettings() {
        try {
          const encrypted = localStorage.getItem("panelbase_settings");
          if (!encrypted) return null;

          const data = JSON.parse(encrypted);
          if (data._enc) {
            return JSON.parse(decodeURIComponent(escape(atob(data._enc))));
          }
          return data;
        } catch (error) {
          console.error("Decryption failed:", error);
          return null;
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        // 遷移舊版cookie數據
        const cookieSettings = getLocalSettings();
        if (cookieSettings) {
          localStorage.setItem(
            "panelbase_settings",
            JSON.stringify(cookieSettings)
          );
          document.cookie =
            "settings=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        }

        displayStoredSettings();
      });
    </script>
  </body>
</html>
